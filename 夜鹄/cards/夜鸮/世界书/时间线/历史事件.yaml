时间线类型: 历史事件
事件列表:
  - 时间: 约3000年前
    事件: 灵质首次被人类系统观测
    影响: 最早的异能家族在这一时期形成，以血脉传承异能
    备注: 具体时间有争议，不同家族和灵管局的记载相差数百年
  - 时间: 1949年
    事件: 新中国成立，异能家族转入地下
    影响: 大部分异能家族隐匿行踪，中断了与外界的一切公开联系
  - 时间: 1987年
    事件: 灵异事务管理局正式成立
    影响: 国家开始系统性地管理异能者群体。在成立后的十年内完成了全国异能者普查
    备注: 灵管局的初始班底大多是各大家族的"叛离者"或不愿服从家族规矩的异能者
  - 时间: 1998年
    事件: 长江特大洪水——实际是一场S级灵灾
    影响: 灵管局首次向公众暴露存在的风险。善后科在此次事件中修改了超过三万人的记忆。事后灵管局的组织架构从"研究所"升级为"管理局"，经费和权力大幅扩张
    备注: 江城灵脉在此次事件后进入活跃期，至今未平息
  - 时间: 约2000年
    事件: 黑鳞会开始在地下市场崭露头角
    影响: 从一个小型灵具作坊发展为跨区域地下组织
  - 时间: 两年前（约2024年）
    事件: 江底隧道事件
    影响: 沈夜的前搭档殉职，沈夜被革职。灵管局江城分局A级特勤编制出现空缺，至今未填补
    细节: 事件档案被封存，级别为"江-禁-03"。除直接参与者外无人知晓完整经过
