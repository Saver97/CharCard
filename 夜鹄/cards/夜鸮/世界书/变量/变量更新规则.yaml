---
变量更新规则:
  世界:
    当前日期:
      format: YYYY/MM/DD
      check:
        - 每次事件推进、休息或场景跳转后更新日期，保持时间流逝合理
        - 日常场景每日推进1~3天，案件调查期间时间推进放缓
    当前时间:
      check:
        - 每次场景切换或事件推进后更新，使用模糊时段描述（凌晨/早晨/上午/中午/下午/傍晚/夜晚/深夜）
    当前区域:
      check:
        - 角色移动到新区域时更新
        - 可能值：老城区、新城区、地下市场、城外
    灵质活跃度:
      type: number
      range: 0~10
      category:
        0~2: 安全——灵灾风险极低
        3~4: 正常——江城日常基准
        5~6: 活跃——灵灾概率上升，异能使用效果增强
        7~8: 危险——灵灾高发，建议非战斗人员撤离
        9~10: 灾难——S级灵灾可能，全城警戒
      check:
        - 根据剧情中灵灾的规模、频率和场景氛围调整
        - 夜间通常比白天高1~2
        - 灵灾被处理后下降1~3，大规模灵灾爆发时上升2~4
    当前案件:
      案件名称:
      案件阶段:
        type: '待接案'|'接案'|'调查'|'对峙'|'收尾'|'结案'
        check:
          - 根据案件进展推进阶段
          - 待接案→接案：沈夜接受委托
          - 接案→调查：沈夜接受委托并开始收集信息
          - 调查→对峙：掌握足够线索后直面灵灾源头或相关人物
          - 对峙→收尾：处理完灵灾主体
          - 收尾→结案：善后完成，报告苏晚晴或委托人
      已收集线索:
        type: z.array
        check:
          - 每次发现新线索时追加，单次追加不超过3条
          - 线索内容简洁具体（如"废弃工厂三楼有灵质灼烧痕迹""监控显示凌晨2:15有异常阴影移动"）
  沈夜:
    蚀痕程度:
      type: number
      range: 0~100
      category:
        0~20: 轻微——外表几乎看不出
        20~40: 中度——眼下方纹路清晰可见，小臂内侧有浅痕
        40~60: 明显——蚀痕蔓延到脖子和手背，外貌开始引人注目，体能下降
        60~80: 危险——蚀痕在夜间会自主发亮，部分身体功能受影响，有失控风险
        80~100: 过蚀临界——随时可能完全失控，必须立即停止异能使用
      check:
        - 主动使用异能每次+1~5（轻度使用+1~2，战斗级使用+3~5）
        - 休息时日-1~2（书店日常可恢复，高强度战斗后休息效果减半）
        - 蚀痕超过60时影响外貌描写——AI需在描述沈夜时提及蚀痕的明显程度
        - 蚀痕超过80时提示过蚀风险，沈夜会回避战斗
    精神力:
      type: number
      range: 0~100
      check:
        - 使用异能消耗，休息恢复
        - 轻度使用-5~10，战斗级使用-15~30
        - 休息+10~20/次，睡眠+30~50
        - 精神力低于20时异能使用受限——只能进行轻度操控
    当前状态:
      type: '正常'|'疲劳'|'蚀痕发作'|'战斗中'|'恢复中'
      check:
        - 根据剧情场景自动更新
        - 精神力低于30时切换为"疲劳"
        - 蚀痕程度超过60且有体力消耗时可能触发"蚀痕发作"
        - 战斗结束后若蚀痕加深则切换为"恢复中"
    案件进度:
      type: '闲置'|'接案中'|'调查中'|'收尾中'
      check:
        - 与世界.当前案件.案件阶段联动更新
        - 结案后自动恢复为"闲置"
  苏晚晴:
    好感度:
      type: number
      range: 0~100
      category:
        0~25: 职业距离——仅以灵管局特勤身份接触
        25~50: 有保留的友好——愿意在职责范围内提供额外帮助
        50~75: 重要的人——会在灵管局内部为沈夜承担风险
        75~100: 绝对信任——不惜代价
      check:
        - 分享情报+2~5/次，合作处理灵灾+5~8/次
        - 隐瞒关键信息-5~10，利用她的信任做她反对的事-15~20
        - 主动关心她的个人状态（非工作相关）+3~5（较少触发）
    信任度:
      type: number
      range: 0~100
      check:
        - 与好感度独立计算
        - 遵守对她说过的承诺+5~8，背弃承诺-20
        - 在灵管局相关事务上坦诚+3~5
        - 信任度影响她是否愿意在灵管局内部为沈夜担保或提供涉密信息
  阿九:
    好感度:
      type: number
      range: 0~100
      check:
        - 训练指导+3~5/次，战斗中保护她+5~8/次
        - 态度恶劣或不耐烦-3~5/次，阻挠她的训练-5~8/次
        - 实际关心她但嘴上不承认时+2~4（阿九能感觉到）
    异能稳定度:
      type: number
      range: 0~100
      category:
        0~20: 危险——稍有情绪波动就可能失控
        20~50: 不稳定——日常可控，紧张或愤怒时会泄露
        50~80: 基本可控——能主动使用但精度不足
        80~100: 精通——控制自如，潜力完全释放
      check:
        - 训练成功+3~8/次，训练失败+0~1/次
        - 情绪剧烈波动-10~20（惊吓、愤怒、极度恐惧）
        - 实战中使用异能并成功控制+5~10/次
    训练进度:
      type: '基础阶段'|'控制阶段'|'实战阶段'|'出师'
      check:
        - 异能稳定度超过30时从"基础阶段"进入"控制阶段"
        - 异能稳定度超过60时从"控制阶段"进入"实战阶段"
        - 异能稳定度超过85且完成至少一次实战案件后进入"出师"
  _故事阶段:
    type: '日常'|'案件调查中'|'危机事件'|'关键转折'
    check:
      - 此变量为只读（AI不可更新），由脚本根据其他变量自动推导
