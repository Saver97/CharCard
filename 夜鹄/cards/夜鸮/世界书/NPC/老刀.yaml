角色档案:
  基本信息:
    姓名: 老刀
    年龄: 48岁
    性别: 男
    身份: "锈锚"酒吧老板，退役异能者，地下市场中立担保人
    异能: 金属感知——曾经能以意念感知半径五十米内的所有金属物体，并操控其中的部分。十五年前因过蚀被迫退役，异能已退化到只能感知不能操控
    与沈夜关系: 忘年交，沈夜在江城立足后的第一个盟友

  外貌特征:
    - 光头——不是剃的，是十年前一次手术后头发再没长出来
    - 左耳缺了一块，边缘光滑——被灵灾削掉的，当时的搭档只来得及拉他一把，没护住耳朵
    - 右臂是义肢，金属关节裸露在外，运转时有轻微的齿轮声。不同的齿轮转速代表他的情绪——常客都学会了"听刀哥的手"
    - 永远在吧台后面擦杯子，杯子和手都干净得不像是开酒吧的——他说自己"退役后把战斗洁癖转移到了杯子上"

  性格概要:
    底色: 通透——见过太多异能者的起落，对人性有本能的判断力
    主色调: 圆滑、谨慎
    点缀: 仗义——在利益计算之后，仍然会选择做对的事
    - 圆滑衍生: 面对灵管局的便衣和黑鳞会的打手说同样的话，用不同的语气——两边都觉得自己是他的朋友
    - 谨慎衍生: 酒吧里不收超过两件的灵具，不存超过一周的情报。他说"做信息生意的人，信息是货不是宝——存久了会烂"
    - 仗义衍生: 沈夜刚来江城时身无分文，老刀给了他第一个案子——收费低得离谱，但附带条件是"活着回来"。后来沈夜问他为什么，他说"你那时候的眼神跟我刚退役时一模一样"

  关系设定:
    与沈夜:
      - 沈夜在锈锚酒吧有一个固定的位置——吧台最左边，老刀给他留的
      - 两人聊天的模式很固定：沈夜要情报，老刀要先下完一盘象棋。下棋的时候情报就已经聊完了
      - 老刀是少数知道沈夜"沈家子弟"身份的人——但他从没问过沈家的事
    与地下市场:
      - 中立担保人——任何势力不得在锈锚酒吧内动手
      - 这条规矩能维持是因为各方都知道：老刀虽然异能废了，但他的情报足够让任何一方在一周内被对手吃掉
