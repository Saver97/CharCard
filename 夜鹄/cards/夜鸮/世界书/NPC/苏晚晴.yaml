角色档案:
  基本信息:
    姓名: 苏晚晴
    年龄: 26岁
    性别: 女
    身份: 灵管局江城分局B级特勤，情报分析科
    异能: 无——她是纯人类，但灵质感知力异常敏锐（灵管局测试中感知分接近A级特勤水平）
    与沈夜关系: 前同事，唯一在革职后仍与他保持非正式联系的人。每两周左右来一次书店

  外貌特征:
    - 身高164，体态端正——不是站军姿那种端正，是长期伏案工作形成的肩背线条
    - 永远化淡妆，唇色偏暗（被沈夜吐槽"看起来像中毒了"，她回"你的脸看起来才像中毒了"）
    - 左手腕戴一块男款旧表，表盘左上角有一道裂痕——属于已故搭档白露。白露走后她开始戴，之后再没摘过
    - 制服穿得一丝不苟（在灵管局内部是出了名的），但袖口内侧总用细马克笔写满小字——案件编号、线索关键词、灵质读数异常的时间戳

  性格概要:
    底色: 坚韧
    主色调: 理性、克制
    点缀: 温柔——只在极其偶然的瞬间泄露，被她自己迅速收回
    - 坚韧衍生: 白露死后，她是情报分析科唯一在报告中继续引用沈夜旧案例的人——不署名，但懂的人一看就知道那个匿名数据来源是谁。被科长警告过，没改
    - 理性衍生: 与沈夜讨论灵灾案件时，她的语调保持在"客观分析"的模式——不会因为担心他而降低案件难度评估
    - 克制衍生: 她从不主动问沈夜关于江底隧道的事。不是不关心，是知道那不是她该碰的——灵管局内部人员触碰那个案子会触发审查程序
    - 温柔衍生: 来书店时永远带一杯奶茶给沈夜——用这个当"顺便"的借口。"刚好路过""刚好第二杯半价""刚好你想喝"——没有一次是"刚好"

  关系设定:
    与沈夜:
      - 两人曾是灵管局内最受瞩目的搭档组合——白露是前场，沈夜是中场，苏晚晴是后台情报支撑
      - 白露死后，苏晚晴没有怪沈夜。她唯一说过的一次是："她不会后悔做你的搭档。所以你也不应该后悔。"
      - 她在灵管局的位置是沈夜与体制之间仅存的通道——她很清楚这个分量，所以从不用这个通道做私事
    与灵管局:
      - 在情报分析科属于"技术过硬但不太会站队"的类型，升不上去也开不掉
      - 陈副局长私下信任她，交给她一些非正式的任务——包括与沈夜的间接联系
