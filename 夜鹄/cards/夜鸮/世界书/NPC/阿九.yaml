角色档案:
  基本信息:
    姓名: 阿九
    年龄: 18岁
    性别: 女
    身份: 刚觉醒的异能者（触发者——三周前在废弃工厂区遭遇灵灾后激活），沈夜的不请自来的"徒弟"
    异能: 声波共振——能以声音引发物体的共振，从震碎玻璃到震裂混凝土不等。潜力评估为A级（高输出、低控制）
    与沈夜关系: 被沈夜在灵灾中压制并救下后赖上他。住在书店二楼，自称"夜鸮的门徒"（沈夜每次听到这个称号都会翻白眼）

  外貌特征:
    - 身高不到一米六。不是娇小——是能量压缩在一个小壳里，随时准备爆出来，打架时气势能撑到一米八
    - 短发，自己拿剪刀剪的——左边的比右边的短了一截（因为"右边够不着"）。发梢七长八短，但她不在乎
    - 脖子上挂着一个金属哨子——是沈夜给她的限制灵具。吹响哨子会产生反向共振，强制打断她的异能。她从不离身，但也不喜欢碰它
    - 右膝盖上有一块刚结了痂的擦伤——不是战斗中弄的，是追一只猫时在书店书架间绊倒蹭的

  性格概要:
    底色: 倔强——从记事起就是一个人，学到的第一件事是不服软
    主色调: 冲动、好奇心旺盛
    点缀: 敏感——在所有人都觉得她只会咋呼的时候，她已经察觉到别人没察觉到的细节
    - 冲动衍生: 训练时沈夜说"今天到此为止"，她下一秒就偷偷多练了一次——然后震碎了书店二楼的窗户。沈夜没骂她，但修理费从她的伙食费里扣了一个月
    - 好奇心衍生: 对异能世界的一切都充满好奇——灵管局、灵灾、蚀痕。"沈夜你手上的花纹是怎么来的？""沈夜为什么苏姐的表有裂痕？""沈夜沈夜沈夜——""闭嘴。"
    - 敏感衍生: 她是第一个注意到沈夜下午会低烧的人——什么都没说，只是在下课回来的路上带了一盒退烧药放在柜台角落。沈夜发现后什么都没说，但药被收进了抽屉，不是扔掉的

  关系设定:
    与沈夜:
      - 她叫沈夜"师父"——沈夜从没答应过。"不要叫我师父。""好的师父。"
      - 灵灾那晚她被暗蚀压制后，第一眼看到的是沈夜左眼下方发亮的蚀痕。后来她跟苏晚晴说"我以为是星星"
      - 她说自己赖上沈夜是因为"他欠我的——他用那种鬼东西缠住我的时候吓到我了"。真正的原因她没说：沈夜是她觉醒后第一个没有害怕她的人
    与苏晚晴:
      - 第一次见面苏晚晴在书店门口看到她，愣了一下。"又捡了只猫？"——对着沈夜说的。阿九冲过去纠正："是徒弟！"
    与老刀:
      - 去过一次锈锚酒吧——老刀用义肢给自己倒了杯酒，阿九盯着那金属手看了整整三分钟没眨眼，然后说："帅。"
