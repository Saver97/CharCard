<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>绝区零 RPG · 角色创建</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px}
.container{max-width:720px;width:100%}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;color:#f0c040;letter-spacing:2px}
.header p{color:#888;font-size:14px;margin-top:8px}
.card{background:#16213e;border-radius:16px;padding:24px;margin-bottom:16px;border:1px solid #1e2d50}
.card h2{font-size:16px;color:#f0c040;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1e2d50;display:flex;align-items:center;gap:8px}
.card h2 .badge{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff}
.badge-green{background:#2a8a4a}.badge-orange{background:#b86b2c}.badge-blue{background:#2a6a8a}.badge-purple{background:#7a4aaa}
.route-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.route-card{padding:20px 16px;border-radius:14px;border:2px solid #1e2d50;background:#0f1b33;color:#ccc;cursor:pointer;text-align:center;transition:all .25s}
.route-card:hover{background:#1a2d50;border-color:#3a5a80;transform:translateY(-2px)}
.route-card.active{border-color:#f0c040;background:#1a2d40;color:#f0c040;box-shadow:0 0 20px rgba(240,192,64,.2)}
.route-card .icon{font-size:36px;display:block;margin-bottom:10px}
.route-card .label{font-weight:700;font-size:16px;margin-bottom:6px}
.route-card .desc{font-size:12px;color:#888;line-height:1.5}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.preset-btn{padding:14px 8px;border-radius:12px;border:2px solid #1e2d50;background:#0f1b33;color:#ccc;cursor:pointer;text-align:center;transition:all .2s;font-size:13px}
.preset-btn:hover{background:#1a2d50;border-color:#3a5a80;transform:translateY(-2px)}
.preset-btn.active{border-color:#f0c040;background:#1a2d40;color:#f0c040}
.preset-btn .icon{font-size:28px;display:block;margin-bottom:6px}
.preset-btn .label{font-weight:600;font-size:12px}
.preset-btn .desc{font-size:10px;color:#888;margin-top:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;color:#999;margin-bottom:4px;font-weight:500}
.form-group input,.form-group select{background:#0f1b33;border:1px solid #1e2d50;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#f0c040}
.form-group input:disabled,.form-group select:disabled{background:#0d1220;border-color:#1a2540;color:#667;cursor:not-allowed}
.form-group select{cursor:pointer}
.form-group .hint{font-size:11px;color:#666;margin-top:4px}
.bb-card{padding:12px;border-radius:10px;border:2px solid #1e2d50;background:#0f1b33;cursor:pointer;transition:all .2s;text-align:center}
.bb-card:hover{border-color:#4fc3f7;background:#102540}
.bb-card.active{border-color:#4fc3f7;background:#0a2a3f}
.bb-card .bb-name{font-size:14px;font-weight:700;color:#e0e0e0;margin-bottom:4px}
.bb-card .bb-faction{font-size:10px;color:#888;margin-bottom:3px}
.bb-card .bb-skill{font-size:11px;color:#4fc3f7}
.start-section{text-align:center;padding:10px 0 20px}
.start-btn{background:linear-gradient(135deg,#f0c040,#d4a020);border:none;border-radius:14px;padding:16px 48px;color:#1a1a2e;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:2px}
.start-btn:hover{transform:translateY(-3px)}
.hidden-section{display:none}
.hidden-section.show{display:block}
.footer{text-align:center;padding:20px;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>⚡ 绝区零 · 角色创建</h1><p>选择你的身份，开始在新艾利都的冒险</p></div>

<div class="card hidden-section show" id="custom-section">
<h2>📋 STEP 1: 选择开局身份</h2>
<div class="presets">
<div class="preset-btn active" onclick="selectPreset('resident',this)"><span class="icon">🏠</span><span class="label">普通居民</span><span class="desc">平凡日常</span></div>
<div class="preset-btn" onclick="selectPreset('officer',this)"><span class="icon">👮</span><span class="label">治安官</span><span class="desc">NEPS基层</span></div>
<div class="preset-btn" onclick="selectPreset('raider',this)"><span class="icon">⛏️</span><span class="label">盗洞客</span><span class="desc">空洞拾荒</span></div>
<div class="preset-btn" onclick="selectPreset('tops',this)"><span class="icon">🏢</span><span class="label">TOPS职员</span><span class="desc">财团中层</span></div>
<div class="preset-btn" onclick="selectPreset('hia',this)"><span class="icon">🔬</span><span class="label">HIA调查员</span><span class="desc">空洞科研</span></div>
<div class="preset-btn" onclick="selectPreset('rider',this)"><span class="icon">🏍️</span><span class="label">外环骑手</span><span class="desc">边缘自由</span></div>
<div class="preset-btn" onclick="selectPreset('proxy',this)"><span class="icon">💿</span><span class="label">独立绳匠</span><span class="desc">没有HDD</span></div>
<div class="preset-btn" onclick="selectPreset('defector',this)"><span class="icon">🌸</span><span class="label">逃亡者</span><span class="desc">称颂会叛逃</span></div>
</div></div>

<div class="card hidden-section show" id="form-section">
<h2>✏️ STEP 2: 自定义角色</h2>
<div class="form-grid">
<div class="form-group"><label>角色姓名 <span style="color:#ef5350">*必填</span></label><input type="text" id="name" placeholder="输入你的名字"></div>
<div class="form-group"><label>种族</label><select id="race" onchange="updateRaceHint()"><option value="人类">人类</option><option value="猫希人">猫希人</option><option value="虎希人">虎希人</option><option value="犬希人">犬希人</option><option value="狼希人">狼希人</option><option value="鲨希人">鲨希人</option><option value="熊希人">熊希人</option><option value="鼠希人">鼠希人</option><option value="兔希人">兔希人</option><option value="狐希人">狐希人</option><option value="章鱼希人">章鱼希人</option><option value="羊希人">羊希人</option><option value="熊猫希人">熊猫希人</option><option value="报丧女妖">报丧女妖</option><option value="鬼族">鬼族</option><option value="精灵">精灵</option><option value="吸血鬼">吸血鬼</option><option value="智能构造体">智能构造体</option></select><span class="hint" id="race-hint">普通人类，无特殊种族特性。</span></div>
<div class="form-group"><label>性别</label><select id="gender"><option value="男">男</option><option value="女">女</option></select></div>
<div class="form-group"><label>年龄</label><input type="number" id="age" value="25" min="10" max="120"></div>
<div class="form-group full"><label>背景简述</label><input type="text" id="bio" value="新艾利都的普通市民"></div>
<div class="form-group"><label>以太适应性 (0-100)</label><input type="number" id="ether" value="45" min="0" max="100" readonly><span class="hint" id="ether-hint">按当前身份范围随机生成</span></div>
<div class="form-group"><label>战斗能力</label><select id="combat"><option value="无">无</option><option value="弱">弱</option><option value="中" selected>中</option><option value="强">强</option><option value="顶尖">顶尖</option></select></div>
<div class="form-group"><label>所属势力</label><select id="faction"><option value="无">无 / 独立</option><option value="新艾利都治安局（N.E.P.S.）">治安局（N.E.P.S.）</option><option value="空洞调查协会（H.I.A.）">H.I.A.</option><option value="防卫军">防卫军</option><option value="狡兔屋">狡兔屋</option><option value="白祇重工">白祇重工</option><option value="卡吕冬之子">卡吕冬之子</option><option value="TOPS财团">TOPS财团</option><option value="独立绳匠">独立绳匠</option></select></div>
<div class="form-group"><label>出生地点</label><select id="startLocation"><option value="六分街·公寓">六分街（雅努斯区·宜居街道）</option><option value="光映广场·街区">光映广场（雅努斯区·商业中心）</option><option value="黑雁工地旧址·工棚">黑雁工地旧址</option><option value="斯科特哨站·营地">斯科特哨站</option><option value="热望角·地下通道">热望角</option><option value="厄匹斯港·码头">厄匹斯港</option><option value="澄辉坪·随便观外">澄辉坪（索恩区）</option><option value="野火镇·加油站">野火镇（外环）</option></select></div>
<div class="form-group"><label>特殊能力 / 特长</label><input type="text" id="special" value="无"><span class="hint" id="special-hint">如：机械维修、黑客、医疗等</span></div>
</div></div>

<div class="card hidden-section show" id="bangboo-section">
<h2>🤖 STEP 3: 邦布伙伴 <span class="badge badge-blue">初始选择</span></h2>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px" id="bangboo-presets"></div>
</div>

<div class="card" id="chapter-section">
<h2>📖 STEP 4: 起始章节</h2>
<div class="form-grid"><div class="form-group full">
<label>选择起始章节</label>
<select id="startChapter" onchange="onChapterChange()">
<option value="0">序章「法厄同」— Fairy苏醒</option>
<option value="1">第一章「猫的失物」</option>
<option value="2">第二章「在空洞的中心呼唤」</option>
<option value="3">第三章「危楼夜寻踪」</option>
<option value="4">第四章「火狱骑行」</option>
<option value="5">第五章「星流霆击」</option>
<option value="6">第二季第一章「云霞同归处」</option>
<option value="7">第二季第二章「迟吟的浪涌」</option>
<option value="8">第二季第三章「不要温和地走入那良夜」</option>
<option value="9">第二季第四章「可曾记得梦」</option>
<option value="10">第二季第五章「将临未抵的深渊」</option>
<option value="11">第二季第六章「微光引灯时」</option>
<option value="12">第二季·间章「旧梦的安可曲」</option>
<option value="13">第二季·尾音(上)「新艾利都日落时」</option>
<option value="14">第二季·尾音(下)「新艾利都日落时」</option>
<option value="15">第三季第一章「某个梦游者的自白」</option>
</select>
<span class="hint" id="chapter-hint">从序章开始，体验完整剧情</span>
</div></div>
</div>

<div class="start-section"><button class="start-btn" onclick="startAdventure()">⚡ 开始冒险</button></div>
<div class="footer">绝区零 RPG · 角色创建面板</div>
</div>

<script>
var currentPreset='resident',selectedChapter=0;
var adventureStarted=false,selectedBangboo='阿全';

function onChapterChange(){selectedChapter=parseInt(document.getElementById('startChapter').value)||0}

var RACE_TRAITS={'人类':'普通人类，无特殊种族特性。','猫希人':'猫科亚人，敏捷灵活、夜视优异。隐性猫爪可伸缩。','虎希人':'虎科亚人，力量爆发力在希人中首屈一指。','犬希人':'犬科亚人，嗅觉极其灵敏。','狼希人':'狼科亚人，天然领导气质。','鲨希人':'海洋掠食者亚人，在液态以太中更活跃。','熊希人':'熊科亚人，防御力与耐力顶尖。','鼠希人':'啮齿类亚人，小巧灵活。','兔希人':'兔科亚人，跳跃力与听觉超出所有希人。','狐希人':'狐科亚人，天生以太感知力远超其他希人。','章鱼希人':'最罕见希人亚种。触手可回溯过去影像。','羊希人':'羊科亚人，以太感知特异化为守夜人之眼。','熊猫希人':'珍惜亚人种，外表憨厚武力值极高。','报丧女妖':'传说种族。音波可直接作用于以太物质。','鬼族':'非人种族，身体耐久数倍于人类。','精灵':'稀有长寿种族，以太适应性天生极高。','吸血鬼':'夜行种族，夜间感官与再生显著增强。','智能构造体':'人工制造的智能生命。不需进食/呼吸/睡眠。'};
function updateRaceHint(){var r=document.getElementById('race').value;document.getElementById('race-hint').textContent=RACE_TRAITS[r]||''}

var PRESETS={resident:{name:'',race:'人类',gender:'男',age:25,bio:'新艾利都的普通市民',etherMin:30,etherMax:60,combat:'无',faction:'无',special:'无',location:'六分街·公寓',canPick:true},officer:{name:'',race:'人类',gender:'男',age:28,bio:'NEPS基层治安官',etherMin:45,etherMax:70,combat:'中',faction:'新艾利都治安局（N.E.P.S.）',special:'标准治安官训练',location:'光映广场·街区',canPick:false},raider:{name:'',race:'猫希人',gender:'男',age:30,bio:'经验丰富的盗洞客',etherMin:60,etherMax:85,combat:'强',faction:'独立',special:'空洞生存经验',location:'厄匹斯港·码头',canPick:false},tops:{name:'',race:'人类',gender:'男',age:32,bio:'TOPS财团中层采购专员',etherMin:25,etherMax:55,combat:'弱',faction:'TOPS财团',special:'内部情报网络',location:'光映广场·街区',canPick:false},hia:{name:'',race:'人类',gender:'男',age:27,bio:'H.I.A.基层调查员',etherMin:65,etherMax:90,combat:'中',faction:'H.I.A.',special:'空洞采样与分析',location:'光映广场·街区',canPick:false},rider:{name:'',race:'人类',gender:'男',age:26,bio:'外环自由骑手',etherMin:40,etherMax:90,combat:'强',faction:'卡吕冬之子',special:'摩托车驾驶维修',location:'野火镇·加油站',canPick:false},proxy:{name:'',race:'人类',gender:'男',age:28,bio:'独立绳匠——没有HDD，每下一单都是赌命',etherMin:75,etherMax:100,combat:'弱',faction:'独立绳匠',special:'手绘空洞路径笔记',location:'六分街·公寓',canPick:false},defector:{name:'',race:'人类',gender:'男',age:24,bio:'曾在称颂会担任基层司祭，目睹不该看的仪式后逃亡',etherMin:50,etherMax:80,combat:'弱',faction:'无',special:'称颂会内部知识',location:'光映广场·街区',canPick:false}};

function rollEther(key){var p=PRESETS[key]||PRESETS.resident;var v=Math.floor(Math.random()*(p.etherMax-p.etherMin+1))+p.etherMin;var ei=document.getElementById('ether');if(ei)ei.value=v;var eh=document.getElementById('ether-hint');if(eh)eh.textContent='该身份范围 '+p.etherMin+'-'+p.etherMax+'，已随机生成：'+v;return v}

function selectPreset(key,el){currentPreset=key;if(el){var cs=el.parentElement.querySelectorAll('.preset-btn');for(var i=0;i<cs.length;i++)cs[i].classList.remove('active');el.classList.add('active')}var p=PRESETS[key];var locked=!p.canPick;document.getElementById('name').value=p.name;document.getElementById('race').value=p.race;document.getElementById('gender').value=p.gender;document.getElementById('age').value=p.age;document.getElementById('bio').value=p.bio;rollEther(key);document.getElementById('combat').value=p.combat;document.getElementById('faction').value=p.faction;document.getElementById('special').value=p.special;document.getElementById('startLocation').value=p.location;updateRaceHint();['bio','combat','faction','special'].forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=locked});var lr=document.getElementById('startLocation');if(lr&&lr.parentElement)lr.parentElement.style.display=locked?'none':''}

var ALL_BANGBOOS=[{name:'艾米莉安',faction:'狡兔屋',skill:'便携机炮·扫债者'},{name:'阿全',faction:'白祇重工',skill:'掘进冲刺——冲撞+电钻'},{name:'巴特勒',faction:'维多利亚家政',skill:'茶歇时间——回复能量'},{name:'阿崔巡查',faction:'治安局',skill:'汪汪连咬'},{name:'赤红莫库斯',faction:'卡吕冬之子',skill:'轰鸣车轮——骑摩托推怪'},{name:'格列佛探员',faction:'对空六课',skill:'紧急行动——三连穿刺'},{name:'咔嚓仔',faction:'天琴座',skill:'咔嚓！看镜头——增伤Buff'},{name:'罗宾',faction:'反舌鸟',skill:'幕布落下——随机卡牌'},{name:'贝利恩',faction:'云岿山',skill:'凤凰球舞——弹跳石球'},{name:'芽芽',faction:'云岿山',skill:'六星飞剑'},{name:'艾斯米小姐',faction:'怪啖屋',skill:'星光变换——回血/回能'},{name:'墨丘利',faction:'防卫军',skill:'战术策略——载具喷火'},{name:'比克布利克',faction:'黑枝',skill:'蒙太奇连击'},{name:'头号粉丝',faction:'妄想天使',skill:'应援——增伤回能'},{name:'鲨牙布',faction:'冰属性',skill:'旱地猎鲨——追踪+鱼雷'},{name:'飚速布',faction:'火属性',skill:'Boom——火箭爆炸'},{name:'插头布',faction:'电属性',skill:'电流狙击——电磁炮'},{name:'共鸣布',faction:'以太属性',skill:'迷你黑洞——牵引敌人'},{name:'左轮布',faction:'物理属性',skill:'幸运左轮——随机礼花弹'},{name:'企鹅布',faction:'维多利亚家政',skill:'冰刀舞——连续斩击'},{name:'恶魔布',faction:'卡吕冬之子',skill:'幻惑之吻——追尾弹'},{name:'纸袋布',faction:'白祇重工',skill:'近一点再近一点——双刀斩击'},{name:'寻宝布',faction:'支援型',skill:'探测器——随机增益'},{name:'果核布',faction:'支援型',skill:'甜甜甘露——果汁弹回血'}];
