---
name: 历史沿革
events:
  - 旧文明时代 | 空洞凭空出现，以太吞噬大地，旧世界文明覆灭
  - 艾利都建国 | 幸存者在废墟上建立「艾利都」——七位虚狩以各自力量划定安全区
  - 约20年前 | 初代虚狩挽昼发明邦布——泛用型小型智能机器人，最初用于空洞灾害引导避难
  - 约15年前 | 赫利俄斯机关成立——卡洛丝教授主导空洞研究与HDD系统开发
  - 约10年前 | 旧都陷落——零号空洞扩张吞没旧艾利都，七虚狩中多位失踪或死亡，挽昼率残部升空建立罗斯凯利法
  - 约10年前 | 新艾利都建立——在大裂谷外侧重建都市，以太工业化开始
  - 约8年前 | 法厄同兄妹在赫利俄斯机关事故中失去父母，卡洛丝成为监护人
  - 约5年前 | 卡洛丝失踪于零号空洞深层，哲与铃继承Random Play录像店与H.D.D.系统
  - 约3年前 | Fairy在H.D.D.系统中苏醒——四钥匙之一，法厄同以绳匠身份开始在绳网接单
  - 约1年前 | 珀尔曼远景案——远景实业用劣质以太设备导致克里特空洞矿难
  - 现今 | 法厄同兄妹经营Random Play为掩护，绳网中最高评级的传奇绳匠——以「法厄同」之名活跃
