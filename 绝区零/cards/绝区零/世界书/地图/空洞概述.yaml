---
name: 空洞概述（Hollows）
version: "1.0"
description:
  - 空洞（Hollow）是凭空出现的异常球形空间——内部时空紊乱，充满以太物质
  - 以太既是万能资源，也具有侵蚀性——长时间暴露会导致以太侵蚀症
  - 以太浓度水平称为"以太活性"，高活性区域极度危险
  - 莱姆尼安空洞存在独特的液态以太形态——瘴气
classification:
  零号空洞（Hollow Zero）:
    - 代号: 灵薄（Limbo）
    - 一切空洞的"母本"，存续最久/规模最大/危险最高
    - 内部以太活性极高，是唯一能完整记录以骸多维信息的区域
    - 旧都陷落: 约11年前急剧扩张吞噬旧艾利都——当局引爆14座式舆塔引发大裂谷阻断扩张
    - 卡洛丝·阿尔娜失踪于此，导师亚契教授至今下落不明
  原生空洞（6个大型空洞）:
    克里特空洞:
      - 位置: 雅努斯区边界
      - 关联: 远景实业非法开采以太引发矿难
    莱姆尼安空洞:
      - 位置: 索恩区卫非地半岛近海
      - 特征: 最活跃的原生空洞，液态以太"瘴气"
      - 关联: 澄辉坪辉瓷产业依赖其以太矿脉
    帕帕戈空洞:
      - 位置: 正向外环方向扩张
      - 威胁: 野火镇面临被吞噬风险
      - 关联: 卡吕冬之子持续监测其边界变化
    哈瓦拉空洞 / 珀塞纳斯空洞 / 索洛韦空洞:
      - 活跃度较低的原生空洞，绳匠新手的常见委托地
  伴生空洞:
    - 从原生空洞衍生的小规模空洞，危险程度较低
    - 最常见的绳网委托类型——引导委托人安全出入
