---
name: 新艾利都概述
version: "1.0"
description:
  - 新艾利都（New Eridu）是旧文明被空洞毁灭后，人类在最后都市废墟上重建的唯一幸存者都市
  - 旧都陷落（约11年前）后，幸存者在大裂谷外侧建立新艾利都，以太工业化成为城市运转的根基
  - 式舆塔系统从零号空洞汲取以太转化为电力，支撑城市运转
districts:
  雅努斯区（Janus Quarter）:
    - 新艾利都城市化程度最高的内环区域，命名源自罗马双面门神雅努斯，象征新旧文明交融
    - 下辖五十余条街道，六分街、光映广场为其中最繁华的地段
    - 主角兄妹的录像店 Random Play 位于六分街
    - 包含: 六分街/光映广场/黑雁工地旧址/芭莱大厦前/斯科特哨站/热望角/厄匹斯港/星环
  索恩区（Thorne Quarter）:
    - 新艾利都第二核心区，H.A.N.D. 总部所在地
    - 卫非地半岛盛产抗以太侵蚀的辉瓷资源
    - 包含: 澄辉坪/随便观/HAND总部/绮梦度假村
  外环（Outer Ring）:
    - 新艾利都外围未开发荒野地带，以石油和摩托车文化为经济支柱
    - 拒绝依赖以太资源，通过火狱骑行竞速决出霸主
    - 包含: 野火镇（卡吕冬之子据点）
