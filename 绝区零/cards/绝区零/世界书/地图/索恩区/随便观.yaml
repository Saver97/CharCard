---
name: 随便观（Suibian Temple）
version: "2.0"
location: 新艾利都·索恩区·澄辉坪
description:
  - 澄辉坪内一座废弃已久的道观，旧都陷落后仅有一只叫"阿朔"的狗和邦布"狮耶"留守
  - 名字来源: 云岿山某位前辈选址时在此地赖着不走，推说是"随便看看"，道观遂得名"随便观"
  - 2.0版本开始作为模拟经营玩法据点: 玩家可派遣邦布、解锁设施，逐步修复并复兴道观
  - 云岿山在此设有联络点——仪玄偶尔在此视察弟子修行
features:
  - 邦布派遣: 派遣拥有的邦布执行资源收集任务
  - 设施解锁: 随着随便观等级提升，解锁炼丹房/藏经阁/练武场等新区域
  - 道观外观自定义
  - 宠物: 阿朔（狗）/ 邦布: 狮耶（留守邦布）
associated_faction: 云岿山（Yunkui Mountain）
