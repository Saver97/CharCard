---
name: 卫非地（Waifei Peninsula）
version: "2.0"
location: 新艾利都·索恩区
description:
  - 索恩区的一片半岛区域，因盛产天然抗以太侵蚀的辉瓷资源而繁荣
  - 与莱姆尼安空洞隔海相望，辉瓷开采与空洞监测是此地两大支柱产业
  - 辉瓷贸易带来的巨大经济利益背后，隐藏着矿工权益纠纷与辉瓷美克公司的垄断阴影
  - 2.0主线故事"云霞同归处"的主要舞台——法厄同受新艾利都市长委托前往此地
features:
  - 辉瓷矿脉（抗以太侵蚀天然矿石，经济命脉）
  - 莱姆尼安空洞近海观测站
  - 旧都陷落时期的前线观察哨遗址
sub_areas:
  - 澄辉坪（主城）
  - 随便观（云岿山据点/模拟经营）
