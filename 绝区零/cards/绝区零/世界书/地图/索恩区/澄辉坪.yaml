---
name: 澄辉坪（Failume Heights）
version: "2.0"
location: 新艾利都·索恩区·卫非地半岛
description:
  - 卫非地的核心主城，中式建筑风格浓厚——唐人街式的茶楼、药房、道观错落有致
  - 原是辉瓷矿工与商人自发形成的聚居区，后发展为卫非地最大的城市聚落
  - 城市建在悬崖之上，俯瞰莱姆尼安空洞海域——"澄辉"之名取自辉瓷在阳光下散发的清亮光泽
  - 2.0版本优化了城内导航，告别读条进门，首次引入3D地图
facilities:
  饮茶仙（Yum Cha Sin）:
    - 茶馆兼委托中介中心，辉瓷矿工与商人的社交枢纽
  平心堂:
    - 中药房，提供战斗消耗品
  好物铺（Good Goods）:
    - 杂货店，日用百货与养成素材
  德丰大押（Devon Pawnshop）:
    - 典当铺，以太结晶/辉瓷/古董估价与交易
  石贵斋:
    - 辉瓷工艺店，店主李宝荣（浮波柚叶的养父）
  随便观（Suibian Temple）:
    - 废弃道观/云岿山据点/模拟经营系统——独立的区域入口
NPC:
  - 李宝荣（石贵斋店主/浮波柚叶养父）
  - 达米安（辉瓷美克地区负责人·反派）
  - 澄辉坪居民（矿工/商人/辉瓷工匠）
