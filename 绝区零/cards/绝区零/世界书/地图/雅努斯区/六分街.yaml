---
name: 六分街（Sixth Street）
version: "1.0"
location: 新艾利都·雅努斯区
description:
  - 雅努斯区最宜居的街道之一，主角兄妹经营录像店 Random Play 的所在地
  - 街道氛围悠闲，居民彼此熟识，是新艾利都最具"日常感"的街区
  - 绳网终端在此设有一个匿名委托中转节点
shops:
  Random Play（录像店）:
    - 哲与铃经营的录像带出租店，实为法厄同绳匠的据点
    - 功能: 自由委托/影像档案挑战/升级邦布/出租录像带/H.D.D.系统终端
  Howl's Newsstand（嚎叫报刊亭）:
    - 经营: 每日刮刮卡、活动资讯
    - 管理者: 邦布"嚎叫"
    - 喵吉长官（Officer Mewmew）位于报刊亭后，发布街区探索任务
  Coff Cafe（科坦咖啡）:
    - 经营: 每日一杯咖啡（+60电量+增益效果）
    - 店主: 汀曼大师（智能构造体）
  Waterfall Soup（瀑汤谷·锦鲤）:
    - 经营: 拉面店，食用获得战斗增益
    - 店主: 乔普师傅（General Chop），六分街总店
  141 Convenience Store（141便利店）:
    - 经营: 角色养成素材（技能芯片/突破材料）
    - 运营: 3台邦布轮班
    - NPC: 罗伊（Roy）
  Box Galaxy（盒乐银河）:
    - 经营: 音擎购买/回收/置换
  Turbo Remodeling Shop（涡轮改装店）:
    - 经营: 邦布改装升级
    - 店主: 恩佐（Enzo）
  Bardic Needle（吟游唱针/微醺缪斯）:
    - 经营: 驱动盘调律与拆解
    - 店主: 埃珐（Elfy/Elfie）
  Godfinger Arcade（神指街机厅）:
    - 经营: 小游戏/限时活动
  Sage in a Barrel（桶中贤者）:
    - 位置: 街道出口附近
    - 经营: 高阶物品兑换
NPC:
  - 乔普师傅（拉面店主）
  - 恩佐（改装店主）
  - 埃珐（音像店主）
  - 汀曼大师（咖啡店主·智能构造体）
  - 罗伊（便利店NPC）
  - 喵吉长官（治安局任务发布·邦布形态）
  - 雅妮婆婆（六分街老人）
  - 希琪/汉娜/克萝拉（六分街居民）
  - 小黑（流浪猫）
