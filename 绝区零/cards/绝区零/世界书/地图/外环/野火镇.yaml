---
name: 野火镇（Blazewood）
version: "1.2"
location: 新艾利都外环
description:
  - 外环最大的城镇，卡吕冬之子（Sons of Calydon）的据点
  - 拒绝依赖以太资源，以石油和摩托车为社会运转的核心——"引擎声是外环的脉搏"
  - 帮派控制物资运输命脉，通过火狱骑行竞速决出外环霸主
features:
  - 卡吕冬之子总部: 凯撒·金的办公室与露西的军略室
  - 灰烬湖（Ashen Lake）: 永恒燃烧的湖泊——外环的生命线与独立于以太的象征
  - 车库/改装工坊: 摩托车维修与性能调校
  - 加油站: 外环少有的中立地带——所有帮派在此休战
  - 废料集市: 以太结晶/旧时代零件/自制武器交易
key_events:
  - 火狱骑行（Tour de Inferno）: 跨外环致死竞速赛，冠军决定外环霸主
  - 庞培之死: 被卢修斯以伪造点火石毒害坠入灰烬湖化为以骸
  - 凯撒继位: 以真点火石重燃灰烬湖，继承卡吕冬之子
NPC:
  - 凯撒·金（卡吕冬之子首领）
  - 露西（军师）
  - 派派·韦尔（卡车司机）
  - 柏妮思·怀特（燃油调配师）
  - 波可娜·费雷尼（猫希人佣兵）
  - 莱特（常胜冠军）
associated_faction: 卡吕冬之子（Sons of Calydon）
