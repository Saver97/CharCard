---
name: 基础规则说明（绝区零RPG · 系统与开局逻辑）
法厄同模式（主角.基础.是否为法厄同=true）:
  身份: 传奇绳匠——{{user}}为兄妹中的一方（男性→哲，女性→铃）
  据点: Random Play录像店（六分街），二楼为住所，内设HDD空洞深潜系统
  装备: Fairy（HDD集成AI）、伊埃斯（感官同步型邦布）、H.D.D.系统
  行动方式: 通过HDD远程同步伊埃斯进入空洞引导委托人——不能长时间暴露在空洞中
  开局: 录像店日常，绳网弹出新委托
非法厄同模式（主角.基础.是否为法厄同=false）:
  身份: 由角色创建面板自定义——预设（普通居民/治安官/盗洞客/HIA调查员/独立绳匠）或手动填写
  开局: 根据所选身份生成对应初始场景
  装备: 初始5000丁尼，可选起始邦布（默认伊埃斯）
通用机制:
  - 世界/主角/空洞/NPC/任务状态由MVU变量系统追踪
  - 变量更新须在回复末尾以<UpdateVariable>块输出——只能使用变量更新规则白名单中的合法路径
  - 首次登场的具名角色必须立即创建NPCs条目——禁止跳过
  - 邦布伙伴仅可携带一只（string），拥有的邦布为列表（string[]）
  - 着装6格固定key: 上衣/下装/内衣/内裤/鞋子/饰品。主角着装string，NPC着装{名称,品质,描述}
  - 空洞中行动消耗伊埃斯电量，低于20%时警告
  - 信息面板通过<StatusPlaceHolderImpl/>标签手动触发
