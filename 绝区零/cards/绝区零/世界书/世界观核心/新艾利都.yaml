---
name: 新艾利都（New Eridu）
title: 最后的都市
overview:
  - 旧文明被空洞毁灭后，人类最后的幸存者都市
  - 掌握了从空洞中提取以太资源的技术，都市繁荣高度依赖空洞工业化
  - 逐渐滋生了财阀垄断（TOPS）、帮派割据、阴谋家和宗教狂热（称颂会）的暗流
  - 旧都陷落约11年后——幸存者在大裂谷外建造
technology:
  - 主流审美: 模拟信号时代美学——磁带未来主义（Cassette Futurism），2000年代初风格
  - 能源: 以太——仅在空洞中产生的万能资源
  - 式舆柱网络: 立柱与地下管道组成，从大型空洞汲取以太，结晶后转化为电力。旧都陷落中沿轴线引爆了14座式舆塔以阻止空洞扩张
population:
  - 人类: ~70%
  - 希人（Thiren）: ~20%
  - 其他幻想种（精灵、鬼族、吸血鬼等）及智能构造体/赛博格: ~10%
language: 中文为主，英文为辅（旧文明残留）
