---
name: 邦布（Bangboo）
description:
  - 初代虚狩「挽昼」发明的泛用型小型智能机器人，最初用于空洞灾害时引导民众避难
  - 外形统一为小型圆润卡通化机械体，但每一只邦布都有独立个性与核心代码
  - 新艾利都随处可见——从便利店的收银员到空洞探索的战斗伙伴
  - 战斗型邦布配备主动技/额外能力/连携技，通过「嗯呢券」在邦布频段抽取（完全免费）
  - ⚠️ 邦布不会说话——只能发出"恩呢恩呢"的机械音，实际含义写在括号中。格式：「恩呢恩呢！(实际说的内容)」
classification:
  S级（阵营特化型）:
    艾米莉安（Amillion）:
      阵营: 狡兔屋
      技能: 便携机炮·扫债者——架设机枪持续射击，狡兔屋越多伤害越高
    阿全（Safety）:
      阵营: 白祇重工
      技能: 掘进冲刺——驾驶状态冲撞+电钻攻击，灼烧/感电状态额外增伤
    巴特勒（Butler）:
      阵营: 维多利亚家政
      技能: 茶歇时间——制作茶点为角色回复能量
    阿崔巡查（Officer Cui）:
      阵营: 治安局
      技能: 汪汪连咬——50%概率追加撕咬，治安局成员越多连携伤害越高
    赤红莫库斯（Red Moccus）:
      阵营: 卡吕冬之子
      技能: 轰鸣车轮——骑摩托将远处敌人推至身边
    格列佛探员（Agent Gulliver）:
      阵营: 对空六课
      技能: 紧急行动——三连穿刺电伤，对感电敌人增伤
    咔嚓仔（Snap）:
      阵营: 天琴座
      技能: 咔嚓！看镜头——闪避/支援时消耗胶卷施加增伤Buff
    罗宾（Robin）:
      阵营: 反舌鸟
      技能: 幕布落下——随机发射红心/黑桃/皇冠卡牌
    贝利恩（Belion）:
      阵营: 云岿山
      技能: 凤凰球舞——投掷弹跳石球，代理人终结技可减CD
    芽芽（Sprout）:
      阵营: 云岿山
      技能: 六星飞剑——召唤六把飞剑，叶瞬光在队时额外强化
    艾斯米小姐（Miss Esme）:
      阵营: 怪啖屋
      技能: 星光变换——召唤泡泡回血或星星回能
    墨丘利（Mercury）:
      阵营: 防卫军
      技能: 战术策略——召唤载具喷火，余震叠加增伤
    比克布利克（Birkblick）:
      阵营: 黑枝
      技能: 蒙太奇连击——浮空炮台激光，EX特技增加失衡值
    头号粉丝（Biggest Fan）:
      阵营: 妄想天使
      技能: 应援——为偶像加油施加增伤与回能Buff
  S级（属性特化型）:
    鲨牙布（Sharkboo）:
      属性: 冰
      技能: 旱地猎鲨——追踪陷阱撕咬+鱼雷，冰队双倍异常积蓄
    飚速布（Rocketboo）:
      属性: 火
      技能: Boom——骑火箭冲锋爆炸，火队双倍异常积蓄
    插头布（Plugboo）:
      属性: 电
      技能: 电流狙击——电磁炮打击，电队双倍异常积蓄
    共鸣布（Resonaboo）:
      属性: 以太
      技能: 迷你黑洞——以太黑洞牵引敌人，以太队双倍异常积蓄
    左轮布（Bangvolver）:
      属性: 物理
      技能: 幸运左轮——随机强力礼花弹/普通弹/彩弹
  A级:
    电击布: 电属性·百方伏特多段电击
    企鹅布: 冰属性·冰刀舞连续斩击（维多利亚家政关联）
    泪眼布: 火属性·拉环爆弹投掷
    恶魔布: 以太属性·幻惑之吻追尾弹（卡吕冬之子关联）
    气压布: 以太属性·吹出以太气泡回复能量
    纸袋布: 强攻特化·双刀连续斩击（白祇重工关联）
    飞靶布: 穿透特化·飞镖投射
    纸壳布: 防护特化·伪装嘲讽+受击爆炸+全队护盾
    磁力布: 异常特化·持续牵引敌人
    扑击布: 击破特化·下落打击+失衡值加成
    寻宝布: 支援特化·探测挖掘随机施加回血/护盾/回能
    果核布: 支援特化·果汁弹回血（上限18次）
    发令布: 指挥赛车冲撞+积攒失衡值
    招财布: 投掷金币持续物理打击
    骑士布: 回能型·捡星星回能+攻击力增益
    格斗布: 近战输出型
    阿饭: 2.6版本新增·偏输出
special:
  - 伊埃斯（Eous）是挽昼为法厄同特制的唯一HDD感官同步邦布，不属于常规战斗体系
  - 邦布属性伤害不独立触发异常——由代理人攻击结算
  - 额外能力需满足队伍属性/阵营/特性配置条件
