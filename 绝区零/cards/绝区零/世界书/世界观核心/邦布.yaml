---
name: 邦布（Bangboo）
description:
  - 新艾利都特有小型兔形智能机器人——最初用于空洞避灾引导
  - 发明者: 艾尔妲·挽昼（Eldreda Sunbringer），初代七虚狩之一，前玛瑟尔集团CEO
  - 成人膝盖高，标志性兔耳，说话发"嗯呢"（Ehn-ne）声，需翻译器与人沟通
  - 心智大多相当于孩童，称呼主人为"家长"
  - 邦布=兔子造型的原因: 挽昼听说搭档乔伊斯通过"神之迷宫"帕帕戈空洞后发现路线数据像胡萝卜，便做成兔子形状。空洞地图数据因此被称为"萝卜（Carrot）"
  - 乔伊斯的第一份空洞路径数据存入挽昼为他制造的邦布原型机
  - 玛瑟尔集团至今仍是邦布的主要生产与发售商
roles: 城市助手、空洞伙伴、战斗邦布（与代理人连携攻击）、感官同步型（如伊埃斯）
