---
name: 以骸（Ethereal）
description:
  - 以太物质高度活性化后诞生的异常"生命体"
  - 对外界生命抱有强烈敌意，大多数无法在空洞外存活
  - 人类被完全侵蚀的终极阶段——可能保留部分人类特征但已丧失神智
  - 攻击生前认识的人。令其安息的唯一方式是杀死他们
origin_types:
  - 以太异形: 由纯粹以太构成的怪物
  - 侵蚀体: 由智慧生命被以太侵蚀后变异而成
notable:
  - 尼尼微（Nineveh）: 共生型以骸集群
  - 绝境屠夫（Dead End Butcher）: 巨型人形以骸
  - 双重木偶（Twin Marionettes）: 芭蕾双塔BOSS
  - 牺牲（Sacrifice）: 由人类注射血清转化，保留意识可在空洞外生存
  - 彷徨猎手（Wandering Hunter）: 卢西娅被侵蚀的父亲
