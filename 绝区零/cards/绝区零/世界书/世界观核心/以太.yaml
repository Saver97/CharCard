---
name: 以太（Ether）
classification: 仅存在于空洞中的高浓度能源物质
characteristics:
  - 可转化为多种形态，空洞内常见固态以太结晶
  - 具有强烈侵蚀性——通过呼吸摄入，有机物质表面出现黑绿色结晶为典型标志
  - 在新艾利都经济中极为重要——从空洞中提取以太资源是整个都市繁荣的工业基础
  - 可用以太镀层剂等技术产品形式利用
corruption:
  - 以太适性（Ether Aptitude）: 0-100分。50分为及格线，分数越高耐受性越强
  - 希人的以太适性通常优于人类，但一旦被侵蚀，变异为以骸的速度比人类更快
  - 智能机械的以太适性取决于材质
  - 侵蚀症状：头晕/头痛/烧灼感/身体疼痛/恶心/幻觉/心脏骤停/内脏损伤/感官丧失/昏迷
  - 终局：完全转化为以骸（Ethereal）——可能保留部分人类特征，已丧失神智，攻击认识的人
  - 儿童和老人最容易被侵蚀。抑制剂和抗侵蚀血清仅为临时措施
  - 以太适性回归症（EARS）: 罕见绝症——终身高适性，晚期急剧恶化、感官丧失、极轻微暴露即可侵蚀。已知最长存活26年，无根治方法
  - 乔纳森医学研究团队可部分逆转小范围短时暴露的侵蚀，技术仍在发展中
