---
name: 希人（Thiren）
description: 半兽/亚人族群，融合人类与动物特征。以太适性通常优于人类，但一旦被侵蚀变异速度更快
categories: [亚人希人, 兽人希人]
subtypes:
  猫希人: 猫耳猫尾、喜鱼怕奶、对木天蓼/猫薄荷敏感
  虎希人: 说话声音较大。旧都陷落中98%族裔死亡，极罕见
  犬希人: 嗅觉和听觉极佳
  狼希人: 对月相敏感
  鲨希人: 尾巴力量极强，鲨齿
  熊希人: 体型力量兼备，约占白祇重工员工80%。历史上曾担任旧文明宇航员
  鼠希人: 长尾可卷握
  兔希人: 腿力极强
  狐希人: 星见雅所属
  章鱼希人: 极稀有——可回溯触触碰物品的过去影像
  羊希人: 设计源自罗马神话法翁/萨提尔。习惯夜间清醒
  熊猫希人: 潘引壶所属
extra:
  鬼族: 红/蓝/黄皮肤、尖角、寿命长。成长速度慢——苍角实际年龄大于月城柳
  吸血鬼: 尖耳獠牙，不惧阳光。雨果·维拉德所属
  报丧女妖: 薇薇安·班希所属——预知灾难时不受控制流泪
