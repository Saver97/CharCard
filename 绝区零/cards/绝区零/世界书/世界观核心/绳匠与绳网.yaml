---
name: 绳匠（Proxy）
description:
  - 活跃在新艾利都的非法职业——引导人们安全出入空洞、规划路线
  - 从业者通常经营副业作为身份掩护（如主角的Random Play录像店）
  - 与官方空洞调查员（H.I.A.）相对——绳匠走的是法外渠道
  - 传奇绳匠"法厄同"（主角兄妹）的特别之处：通过H.D.D系统与伊埃斯邦布感官同步，远程实时引导——不需要肉身进入空洞
  - Fairy加入后算力暴涨270倍——近乎实时更新路径，变成"活地图"
methods: 解迷宫算法、萝卜数据（空洞地图）、H.D.D.系统、AI辅助（Fairy）
related:
  绳网（Inter-Knot）: 全称"违法空洞业务信息汇集与专包匿名论坛"。新艾利都最大的绳匠聚集地，类似暗网——绳匠接委托、交换情报的平台
  萝卜（Carrot）: 具时效性的空洞路线数据——由空洞调查协会或绳匠制作，类似给盗洞客用的芯片地图
  盗洞客（Hollow Raider）: 未经官方许可私自进入空洞的非法探索者——为了搜寻以太资源冒险，通常需要萝卜或绳匠引路
