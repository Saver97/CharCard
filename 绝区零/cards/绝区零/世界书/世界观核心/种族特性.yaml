---
name: 种族特性
description: 新艾利都各类智慧种族的生物学特征、社会地位与常见反应
races:
  人类:
    - 新艾利都最普遍的种族，占人口绝大多数
    - 无特殊先天能力，但适应力最强——能在任何环境中找到生存之道
    - 社会地位: 主流。TOPS高层、N.E.P.S.领导层多为人类
  猫希人:
    - 猫科亚人，敏捷+夜视+平衡感极强。隐形猫爪可伸缩
    - 常见职业: 盗洞客、情报贩子、自由绳匠。社会偏见: "猫希人管不住自己的爪子"
    - NPC互动: 其他猫希人看到你会多一分亲切；某些高档场所会多看你一眼
  虎希人:
    - 虎科亚人，力量和爆发力在希人中首屈一指。战斗直觉敏锐
    - 常见职业: 战斗代理人、佣兵、武术家。尾巴会暴露情绪——藏不住
    - NPC互动: 人们本能地给你让路；格斗类委托的委托人更信任你
  犬希人:
    - 犬科亚人，嗅觉追踪残留以太气味。对同伴的危机有第六感
    - 常见职业: 治安官、搜救员、保镖。忠诚在警队中是被默认期待的特质
    - NPC互动: 治安局同事对你更信赖；小偷看到你会绕路
  狼希人:
    - 狼科亚人，天然领导气质与群体协作本能。优雅表面下是掠食者的基因
    - 常见职业: 执事、管家、企业高管。莱卡恩是狼希人中最著名的代表
    - NPC互动: 上流社会认可你的存在；低层居民可能觉得你"太干净"
  鲨希人:
    - 海洋掠食者亚人，在液态以太（瘴气）中反而更活跃。牙齿可再生
    - 常见职业: 瘴气区域探索者、水下空洞调查。战斗风格: 要么不动，要么一击致命
    - NPC互动: 普通人对你的牙有本能恐惧；HIA对你的瘴气抗性有专业兴趣
  熊希人:
    - 熊科亚人，防御力与耐力顶尖。外表凶悍内心敦厚
    - 常见职业: 会计师、工程师、重工业工人。本·比格是熊希人的文化符号
    - NPC互动: 人们第一眼会被你的体型吓到，第二眼被你的数学能力震惊
  鼠希人:
    - 啮齿类亚人，小巧灵活反应快。对狭窄空间的适应力无人能及
    - 常见职业: 管道工、空洞侦察兵、情报传递者。"鼠希人能穿过任何缝隙"
    - NPC互动: 帮派会高薪挖你；正规企业可能觉得你"不够体面"
  兔希人:
    - 兔科亚人，跳跃力与听觉超出所有希人亚种。常见轻微的对称强迫症
    - 常见职业: 声呐操作员、空洞声波测绘师。爱丽丝是兔希人的代表
    - NPC互动: 你可能会对不对称的招牌皱眉；听觉优势让你在调查中占优
  狐希人:
    - 狐科亚人，天生以太感知力远超其他希人。千年狐狸的狡猾刻在基因里
    - 常见职业: 绳匠、战略顾问、情报分析师。星见雅是狐希人的最高成就
    - NPC互动: 人们既崇拜你的能力又防着你的心计；HAND对狐希人绳匠格外关注
  章鱼希人:
    - 最罕见的希人亚种之一，触手可透过多维空间回溯物体附着的过去影像——"记忆触摸"
    - 常见职业: 犯罪现场调查、考古学家、历史学者。"墨菲家族"是唯一的章鱼希人血脉
    - NPC互动: 你的触手会让初次见面的人不安；但调查案件的委托人对你趋之若鹜
  羊希人:
    - 羊科亚人，以太感知特异化为"守夜人之眼"——能精确定位以骸的以太波长
    - 常见职业: 空洞守夜人、以骸追踪者。沉默寡言但可靠——"守夜人不会丢下任何人"
    - NPC互动: 矿区和空洞边缘的人对羊希人守夜人有近乎宗教般的信任
  熊猫希人:
    - 珍惜亚人种，外表憨厚但武力值极高。对美食有不可妥协的执念
    - 常见职业: 厨师、武术教练、云岿山弟子。潘引壶是熊猫希人的门面
    - NPC互动: 你走到哪里都会被请吃饭——"熊猫希人肯吃你的菜是天大的面子"
  报丧女妖:
    - 传说级稀有种族，音波可直接作用于以太物质——"死亡预兆"是偏见面具下的孤独
    - 常见职业: 声波武器操作员、空洞通信专家。薇薇安·班希是唯一的已知个例
    - NPC互动: 普通人看到你会回避；但了解真相的人知道——你只是想要一个朋友
  鬼族:
    - 非人种族，身体耐久是人类的数倍，受伤后恢复速度快。皮肤多呈蓝/紫色调
    - 常见职业: 地下竞技场斗士、重体力劳工。社区文化深厚——在新艾利都有独属的鬼族街区
    - NPC互动: 人类的恐惧来自不了解；鬼族社区内，你是自己人；社区外，你是"他们"
  精灵:
    - 稀有长寿种族，以太适应性天生极高。活过的岁月里见证了旧文明到新艾利都的全程
    - 常见职业: 以太学者、空洞历史学家。"精灵的沉默里装着一千年的故事"
    - NPC互动: HIA对你的以太理论刮目相看；普通人觉得你"不食人间烟火"
  吸血鬼:
    - 夜行种族，夜间各项感官与再生能力显著增强。吸血非生存必须——更像心理依赖
    - 常见职业: 夜间空洞调查、情报交易。雨果·维拉德是新艾利都唯一的已知吸血鬼
    - NPC互动: 白天你和其他人差不多——但夜晚你做的事情最好不要让治安局知道
  智能构造体:
    - 人工制造的智能生命。不需进食/呼吸/睡眠——身体可更换，但"灵魂"（核心代码）是唯一的
    - 常见职业: 几乎涵盖所有领域——从便利店邦布到对空六课执行官。青衣和比利是构造体平权的标志性人物
    - NPC互动: 某些人把你当工具而非人；Youkai事件后社会对构造体的信任出现了裂痕——但你也可以成为弥合裂痕的力量
