---
name: 新艾利都城区
city: 新艾利都（New Eridu）——旧都陷落后在大裂谷外重建的最后都市
districts:
  雅努斯区（Janus Quarter）:
    - 城市化程度最高的内环区域，命名源自罗马双面神雅努斯——象征新旧文明交融
    - 六分街（Sixth Street）: 主角兄妹居住地，Random Play录像店所在。游戏主要日常据点
    - 光映广场（Lumina Square）: 繁华商业中心。HIA俱乐部（作战模拟）、科坦咖啡、瀑汤谷拉面、引力影院、San-Z工作室
  索恩区（Thorne Quarter）:
    - H.A.N.D.总部所在地
    - 澄辉坪（Failume Heights）: 卫非地半岛主城，悬崖城市
    - 卫非地（Waifei Peninsula）: 靠近莱姆尼安空洞，辉瓷开采经济区
  其他:
    - 帆布街、第十四街
    - 热望角（Reverb Arena）
    - 厄匹斯港（Port Elpis）
