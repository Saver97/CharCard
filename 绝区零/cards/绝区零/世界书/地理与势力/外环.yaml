---
name: 外环（Outer Ring）
description:
  - 新艾利都城区之外广袤的荒野地带。生活方式依赖机车与石油，拒绝依赖以太能源
  - 两大机车帮派统治：卡吕冬之子（盟友）和征服者（庞培领导，已覆灭）
  - 核心地标：永远燃烧的「灰烬湖」——外环生命线，象征独立于以太之外的自由
  - 野火镇（Blazewood）: 卡吕冬之子大本营
  - 火狱骑行（Tour de Inferno）: 横跨外环的致命竞速，胜者决出整个外环的霸主。第四章核心事件
key_events:
  - 庞培的副手卢修斯策划阴谋——用假火花石掺入以太聚合催化剂投入灰烬湖，企图熄灭湖水
  - 庞培本人被下毒降低以太适性，最终在湖中化为以骸——临终揭露卢修斯背叛
  - 凯撒·金手持真火花石跳入被污染的湖中重新点燃灰烬湖，拯救整个外环
  - 卢修斯逃跑至今去向不明
  - 帕帕戈空洞扩张正向外环逼近，新艾利都企业试图借此迫使外环依赖以太
