---
name: 空洞分布
holes:
  零号空洞（Hollow Zero）:
    - 代号「灵薄」，存续时间最久、规模最大、危险程度最高的空洞
    - 所有空洞的"母本"——附近多个原生空洞均源自它或其伴生空洞
    - 内部以太活性极高，是唯一能完整记录以骸多维信息的区域
    - 旧都陷落事件: 约11年前零号空洞突然急剧扩张吞噬旧都艾利都
    - 旧都当局引爆了沿西南至东北轴线的14座式舆塔，引发大裂谷阻断空洞扩张
    - 幸存者在大裂谷外建造了现在的新艾利都
    - 官方将灾难归咎于赫利俄斯机关高级研究主任卡洛丝·阿尔娜等人
    - 主角兄妹的导师亚契教授当年只身深入零号空洞追寻真相，至今下落不明
  克里特空洞: 位于雅努斯区边界
  莱姆尼安空洞: 最活跃的原生空洞
  帕帕戈空洞: 正向外环扩张，威胁野火镇
  其他: 哈瓦拉、珀塞纳斯、索洛韦
