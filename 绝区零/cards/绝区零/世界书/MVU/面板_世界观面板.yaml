---
name: "世界观面板"
triggers:
  - "世界状态"
  - "当前时间"
  - "当前地点"
  - "当天计划"
  - "时间"
  - "地点"
  - "world"
description: "当前时间、地点与计划"
variables:
  世界.当前时间: { type: "string", default: "6月28日·星期日", desc: "当前日期·星期（与真实时间同步）" }
  世界.当前地点: { type: "string", default: "雅努斯区·六分街·Random Play", desc: "所在城区或空洞名称" }
  世界.沙盒时间: { type: "number", default: 0, desc: "经过天数，每天+1递增" }
  世界.当天计划: { type: "string", default: "录像店营业", desc: "当天主要活动" }
  世界.天气: { type: "string", default: "晴好·微风", desc: "当前天气与氛围" }
  世界.城市流言: { type: "string", default: "", desc: "绳网热帖/街头传说/路人八卦" }
  世界.绳网活跃度: { type: "string", default: "普通", desc: "当前委托量与紧急程度：清淡/普通/繁忙/爆满" }
rules:
  - "① 进入空洞时：世界.当前地点 → 空洞名称"
  - "② 每日开始时：世界.当天计划 → 录像店营业/绳匠委托/探索空洞/社交活动"
  - "③ 时空切换时（如从六分街到光映广场）：更新世界.当前地点"
  - "④ 天气根据时间和剧情变化，城市流言随玩家探索而刷新"
