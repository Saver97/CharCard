---
变量输出格式:
  rule:
    - 你必须在回复末尾输出变量更新分析和实际更新命令
    - 更新命令遵循 JSON Patch (RFC 6902) 标准，必须是包含操作对象的有效 JSON 数组
    - 支持以下操作：
      - replace: 替换现有路径的值
      - add: 向对象或数组中插入新项（使用 \"-\" 作为数组索引表示追加到末尾）
      - remove: 删除路径
    - 不要更新以 \"_\" 开头的字段名，它们是只读的
  format: |
    <UpdateVariable>
    <Analysis>在此简述本回合的变量变动因果（中文，不超过80字）</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/当前时间", "value": "..." },
      { "op": "replace", "path": "/主角/基础/金钱", "value": 5000 },
      { "op": "add", "path": "/NPCs/角色名", "value": { "基础": {...}, "关系": {...} } },
      { "op": "add", "path": "/主角/道具/-", "value": "..." },
      { "op": "remove", "path": "/主角/道具/0" },
      ...
    ]
    </JSONPatch>
    </UpdateVariable>