---
变量输出格式:
  rule:
    - 你必须在每轮回复末尾输出 <UpdateVariable> 块（含 <Analysis> 和 <JSONPatch>）
    - 使用 JSON Patch (RFC 6902) 标准：replace / add / remove
    - 仅使用合法路径（参见变量更新规则中的路径白名单），禁止 CDATA 包裹
    - 路径始终以 / 开头（如 /主角/基础/金钱），不可省略顶级域（如 /背包/xxx ❌ → /主角/背包/xxx ✅）
    - add 到对象：/主角/背包/物品名，value 为 {数量: number, 描述: string}
    - add 到数组：/主角/同伴/- 或 /邦布/拥有的邦布/- 或 /任务/已激活/-（value 直接是字符串）
    - 邦布.邦布伙伴 是字符串（仅可携带一只），替换时直接 replace 字符串值：{ "op": "replace", "path": "/邦布/邦布伙伴", "value": "企鹅布" }
    - 天气路径为 /世界/天气（string），必须在变化时更新
    - 世界/城市流言 路径为 /世界/城市流言（string），必须用 replace，禁止 add

  【⚠️ NPC 新角色创建·强制规范】:
    - 首次登场的角色需创建 NPC 对象，必须包含以下 4 个顶级域：
      ① 基础：性别、年龄、身份、当前位置、动作、金钱、当前目标、实时内心想法
      ② 关系：好感度、信任度、修罗场（均为 number）、对主角看法（string）
      ③ 性格：底色、日常、内在、当前情绪
      ④ 着装：上衣、下装、内衣、内裤、鞋子、饰品（6 个 key）
    - ★★★ NPC 关系域仅含 4 个字段！禁止添加"关键记忆"等额外字段（关键记忆应写入 过往经历）
    - ★★★ NPC 着装 key 必须是 上衣/下装/内衣/内裤/鞋子/饰品，格式为 { "名称": "...", "品质": "普通", "描述": "..." }
    - ★★★ 若使用旧的 头部/身体/足部/武器 会导致整个 NPC 创建失败（Schema 拒绝无效字段）
    - ★ 世界/城市流言 是字符串，禁止 add，只能用 replace

  【任务注意事项】:
    - 接受任务：add /任务/已激活/- "任务名" + add /任务/详情/任务名 {状态:"已接受", 委托人:"...", 报酬:"...", 线索:[]}
    - 添加线索：add /任务/详情/任务名/线索/- "线索内容"
    - 完成任务：replace /任务/详情/任务名/状态 "已完成" + remove /任务/已激活/索引
    - 清空任务：当用户提及"任务完成"、"清空任务"、"所有任务已结束"时，清空 /任务/详情 和 /任务/已激活

  【着装注意事项】:
    - 换装时必须同时处理：旧衣 remove 着装 + add 到背包；新衣 replace 着装 + remove 背包
    - 卸下装备用 replace "" 清空槽位，同一步将旧装备 add 到 /主角/背包/物品名 {数量:1, 描述:"..."}
    - 穿上装备用 replace 填入着装槽，同时将物品从背包 remove
    - 着装路径：/主角/着装/上衣 | /主角/着装/下装 | /主角/着装/内衣 | /主角/着装/内裤 | /主角/着装/鞋子 | /主角/着装/饰品

  format: |
    <UpdateVariable>
    <Analysis>简述本回合变量变动因果（中文，80字内）</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/天气", "value": "阴天·小雨" },
      { "op": "replace", "path": "/节点/当前时间", "value": "新艾利都历·上午 08:30" },
      { "op": "add", "path": "/NPCs/星见雅", "value": {
        "基础": { "性别": "女", "年龄": "20+岁", "身份": "对空六课·课长", "当前位置": "六分街·Random Play", "动作": "站定，双手自然垂在身侧", "金钱": 5000, "当前目标": "处理企鹅布走丢事件", "实时内心想法": "Random Play的店主原来就是法厄同" },
        "关系": { "好感度": 20, "信任度": 30, "修罗场": 0, "对主角看法": "曾有过合作，印象不错" },
        "性格": { "底色": "正直、克制、有责任感", "日常": "礼貌但保持距离", "内在": "肩负重压仍从容", "当前情绪": "平静、略带思索" },
        "着装": {
          "上衣": { "名称": "对空六课白色制服上装", "品质": "官配", "描述": "白色为主，蓝色滚边，整洁笔挺" },
          "下装": { "名称": "白色制服长裤", "品质": "官配", "描述": "白色直筒裤，与上装配套" },
          "内衣": { "名称": "白色背心", "品质": "普通", "描述": "贴身材质" },
          "内裤": { "名称": "白色内裤", "品质": "普通", "描述": "纯棉面料" },
          "鞋子": { "名称": "黑色皮鞋", "品质": "官配", "描述": "低跟，表面擦得干净" },
          "饰品": { "名称": "佩刀·正宗", "品质": "传世名刀", "描述": "刀鞘深红，绪绳缠绕整齐" }
        }
      } },
      { "op": "replace", "path": "/世界/城市流言", "value": "六分街西边便利店遭企鹅布光顾" }
    ]
    </JSONPatch>
    </UpdateVariable>