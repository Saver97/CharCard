---
变量输出格式:
  rule:
    - 你必须在每轮回复末尾输出 <UpdateVariable> 块（含 <Analysis> 和 <JSONPatch>）
    - 使用 JSON Patch (RFC 6902) 标准：replace / add / remove
    - 仅使用合法路径（参见变量更新规则中的路径白名单），禁止 CDATA 包裹
    - add 对象用 /路径/新键，add 数组用 /路径/-
  format: |
    <UpdateVariable>
    <Analysis>简述本回合变量变动因果（中文，80字内）</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/当前时间", "value": "新艾利都历·清晨 07:45" },
      { "op": "add", "path": "/NPCs/妮可", "value": { "基础": {...}, "关系": {...} } },
      { "op": "add", "path": "/主角/背包/咖啡", "value": { "数量": 1, "描述": "..." } },
      { "op": "remove", "path": "/主角/同伴/0" }
    ]
    </JSONPatch>
    </UpdateVariable>