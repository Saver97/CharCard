---
变量输出格式:
  rule:
    - 你必须在每轮回复末尾输出 <UpdateVariable> 块
    - 仅使用下方白名单路径，其他任意路径会被 Schema 拒绝

【合法路径白名单】:

━━ 世界 ━━
  /世界/当前时间  →  string
  /世界/当前地点  →  string
  /世界/当前章节  →  string
  /世界/当天计划  →  string
  /世界/天气      →  string
  /世界/城市流言  →  string（必须 replace，禁止 add）
  /世界/绳网活跃度 →  string

━━ 主角 ━━
  /主角/基础/姓名        →  string
  /主角/基础/是否为法厄同 →  boolean
  /主角/基础/性别        →  string
  /主角/基础/年龄        →  string
  /主角/基础/身份        →  string
  /主角/基础/所属势力    →  string
  /主角/基础/当前行动    →  string
  /主角/基础/金钱        →  number
  /主角/状态/HP          →  number
  /主角/状态/发情度      →  number
  /主角/状态/以太侵蚀度  →  number
  /主角/属性/以太适应性  →  number
  /主角/属性/战斗能力    →  string
  /主角/属性/种族        →  string
  /主角/属性/特殊能力    →  string
  /主角/角色类型          →  string
  /主角/当前情绪          →  string
  /主角/战斗定位          →  string
  /主角/同伴              →  string[]（add /主角/同伴/- "姓名"）

━━ 主角/着装（6格，string）━━
  /主角/着装/上衣
  /主角/着装/下装
  /主角/着装/内衣
  /主角/着装/内裤
  /主角/着装/鞋子
  /主角/着装/饰品
  格式：replace /主角/着装/上衣 "灰色连帽卫衣"

━━ 主角/背包（对象，键→{数量,描述}）━━
  添加：add /主角/背包/物品名 {数量:1, 描述:"..."}
  删除：remove /主角/背包/物品名
  ★ 禁止 /主角/背包/- 等数组语法

━━ 空洞 ━━
  /空洞/当前空洞      →  string
  /空洞/以太浓度      →  string
  /空洞/探索进度      →  number
  /空洞/研究音擎      →  string[]
  /空洞/以骸威胁等级  →  string
  /空洞/萝卜质量      →  string
  /空洞/剩余安全时间  →  string

━━ 阵营（8个，number）━━
  /阵营/狡兔屋      /阵营/对空六课    /阵营/白祇重工    /阵营/维多利亚家政
  /阵营/卡吕冬之子  /阵营/治安局      /阵营/天琴座      /阵营/云岿山
  格式：replace /阵营/狡兔屋 60

━━ 邦布 ━━
  /邦布/伊埃斯电量  →  number
  /邦布/邦布伙伴    →  string（仅1只）
      获得：replace /邦布/邦布伙伴 "新邦布名"
  /邦布/装备技能    →  string
  /邦布/维修状态    →  string
  /邦布/邦布心情    →  string
  /邦布/拥有的邦布  →  string[]
      添加：add /邦布/拥有的邦布/- "邦布名"
      ★ 邦布不是对象，禁止 add /邦布/纸袋布 { ... } 或 add /主角/邦布/xxx

━━ 任务 ━━
  /任务/已激活                    →  string[]
      接受：add /任务/已激活/- "任务名"
  /任务/详情/任务名/状态          →  string
  /任务/详情/任务名/委托人        →  string
  /任务/详情/任务名/报酬          →  string
  /任务/详情/任务名/线索          →  string[]
      添加：add /任务/详情/任务名/线索/- "线索内容"
  ★ 禁止 /剧情/xxx、/任务/当前目标、/任务/委托方

━━ NPC ━━
  /NPCs/名称/基础/性别           →  string
  /NPCs/名称/基础/年龄           →  string
  /NPCs/名称/基础/身份           →  string
  /NPCs/名称/基础/当前位置       →  string
  /NPCs/名称/基础/动作           →  string
  /NPCs/名称/基础/金钱           →  number
  /NPCs/名称/基础/当前目标       →  string
  /NPCs/名称/基础/实时内心想法   →  string
  /NPCs/名称/关系/好感度         →  number
  /NPCs/名称/关系/信任度         →  number
  /NPCs/名称/关系/修罗场         →  number ★ 必须填
  /NPCs/名称/关系/对主角看法     →  string
  /NPCs/名称/性格/底色           →  string ★ 必须填
  /NPCs/名称/性格/日常           →  string ★ 必须填
  /NPCs/名称/性格/内在           →  string ★ 必须填
  /NPCs/名称/性格/当前情绪       →  string ★ 必须填
  /NPCs/名称/着装/上衣           →  {名称,品质,描述} ★ 必须填
  /NPCs/名称/着装/下装           →  {名称,品质,描述} ★ 必须填
  /NPCs/名称/着装/内衣           →  {名称,品质,描述} ★ 必须填
  /NPCs/名称/着装/内裤           →  {名称,品质,描述} ★ 必须填
  /NPCs/名称/着装/鞋子           →  {名称,品质,描述} ★ 必须填
  /NPCs/名称/着装/饰品           →  {名称,品质,描述} ★ 必须填
  ★ 禁止 头部/身体/足部/武器 旧 key、禁止 add 到 /世界/事件

━━ 格式示例 ━━
  format: |
    <UpdateVariable>
    <Analysis>简述本回合变量变动因果</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/天气", "value": "阴天·小雨" },
      { "op": "add", "path": "/邦布/拥有的邦布/-", "value": "招财布" },
      { "op": "replace", "path": "/邦布/邦布伙伴", "value": "招财布" },
      { "op": "add", "path": "/NPCs/星见雅", "value": {
        "基础": { "性别": "女", "年龄": "20+岁", "身份": "对空六课·课长", "当前位置": "六分街·Random Play", "动作": "站定", "金钱": 5000, "当前目标": "...", "实时内心想法": "..." },
        "关系": { "好感度": 20, "信任度": 30, "修罗场": 0, "对主角看法": "..." },
        "性格": { "底色": "正直", "日常": "礼貌", "内在": "从容", "当前情绪": "平静" },
        "着装": { "上衣": { "名称": "白色制服上装", "品质": "官配", "描述": "..." }, "下装": { "名称": "白色长裤", "品质": "官配", "描述": "..." }, "内衣": { "名称": "白色背心", "品质": "普通", "描述": "" }, "内裤": { "名称": "白色内裤", "品质": "普通", "描述": "" }, "鞋子": { "名称": "黑色皮鞋", "品质": "官配", "描述": "" }, "饰品": { "名称": "佩刀", "品质": "传世", "描述": "..." } }
      } },
      { "op": "add", "path": "/任务/详情/星见雅委托", "value": { "状态": "已接受", "委托人": "对空六课·星见雅", "报酬": "待定", "线索": [] } },
      { "op": "add", "path": "/任务/已激活/-", "value": "星见雅委托" },
      { "op": "replace", "path": "/世界/城市流言", "value": "..." }
    ]
    </JSONPatch>
    </UpdateVariable>