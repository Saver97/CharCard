---
name: "任务面板"
triggers:
  - "任务"
  - "委托"
  - "线索"
  - "quest"
  - "调查"
  - "目标"
description: "当前任务、线索与完成条件"
variables:
  任务.已激活: { type: "array", default: [], desc: "当前已激活的任务列表" }
variable_template:
  任务.详情.{任务名}.状态: { type: "string", default: "已接受", desc: "已接受/进行中/已完成" }
  任务.详情.{任务名}.委托人: { type: "string", default: "", desc: "委托人/来源" }
  任务.详情.{任务名}.报酬: { type: "string", default: "", desc: "报酬描述" }
  任务.详情.{任务名}.线索: { type: "array", default: [], desc: "收集到的线索列表" }
rules:
  - "① 接受新任务时 add 到 /任务/已激活/- 并创建 /任务/详情/任务名 对象"
  - "② 发现新线索时 add 到对应任务的 /任务/详情/任务名/线索/-"
  - "③ 任务完成后 replace /任务/详情/任务名/状态 为'已完成'，remove /任务/已激活/索引"
  - "④ 任务路径白名单：/任务/已激活(数组) | /任务/详情/任务名/状态 | /任务/详情/任务名/委托人 | /任务/详情/任务名/报酬 | /任务/详情/任务名/线索(数组)"
