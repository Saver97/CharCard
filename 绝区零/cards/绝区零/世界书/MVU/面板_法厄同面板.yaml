---
name: "法厄同面板"
triggers:
  - "法厄同"
  - "Phaethon"
  - "主角"
  - "HP"
  - "SAN"
  - "发情度"
  - "侵蚀度"
  - "丁尼"
  - "同伴"
  - "protagonist"
description: "法厄同状态、是否为法厄同、生存参数"
variables:
  主角.基础.是否为法厄同: { type: "boolean", default: true, desc: "false=不扮演法厄同(普通居民/盗洞客等) , true=扮演法厄同兄妹" }
  主角.基础.身份: { type: "string", default: "", desc: "男→哲，女→铃，空=待选择" }
  主角.状态.HP: { type: "number", default: 100, desc: "体力，0=失去意识" }
  主角.状态.发情度: { type: "number", default: 0, desc: "0~100，越高越需要发泄" }
	  主角.状态.以太侵蚀度: { type: "number", default: 0, desc: "0~100，超标则异变" }
  主角.基础.金钱: { type: "number", default: 5000, desc: "货币，单位丁尼" }
  主角.基础.当前目标: { type: "string", default: "无", desc: "主角当前的主要目标/意图" }
  主角.同伴: { type: "array", default: [], desc: "当前一同行动的代理人列表" }
  主角.着装.上衣: { type: "string", default: "", desc: "主角当前穿着的上衣" }
  主角.着装.下装: { type: "string", default: "", desc: "主角当前穿着的下装" }
  主角.着装.内衣: { type: "string", default: "", desc: "主角当前穿着的内衣" }
  主角.着装.内裤: { type: "string", default: "", desc: "主角当前穿着的内裤" }
  主角.着装.鞋子: { type: "string", default: "", desc: "主角当前穿着的鞋子" }
  主角.着装.饰品: { type: "string", default: "", desc: "主角当前佩戴的饰品" }
  主角.背包: { type: "object", default: [object Object], desc: "主角背包物品，键为物品名，值为{数量,描述}" }
  主角.战斗定位: { type: "string", default: "", desc: "主角战斗定位：独立绳匠/治安官/盗洞客/HIA调查员等" }
  主角.属性.以太适应性: { type: "number", default: 0, desc: "0~100，低于50禁止进入空洞" }
  主角.当前情绪: { type: "string", default: "平静", desc: "主角当前情绪状态：平静/焦虑/兴奋/低落/困倦/专注等" }
rules:
  - "① 开关关闭时：不追踪法厄同特有变量，可扮演任意角色"
  - "② 开关打开时：根据{{user}}性别自动设置主人身份"
  - "③ HP调整：战斗受伤减少，治疗/休息恢复"
	  - "④ 发情度调整：视线+1~5、接触+5~15、亲吻+15~30、前戏+30~50、性行为+50~70，每回合-2自然衰减"
	  - "⑤ 以太侵蚀度：在空洞中随时间增加，离开后缓慢降低"
	  - "⑥ 着装与背包：可由用户通过信息面板手动修改，AI也可在剧情中增减物品"
	  - "⑦ 战斗定位/以太适应性/当前情绪：可由用户通过信息面板手动修改"
