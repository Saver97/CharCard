---
name: 挽昼（Sunbringer）
role: 初代七虚狩之一，玛瑟尔集团创始人，邦布发明者，罗斯凯利法建立者
type: 智能构造体（原始挽昼将自己分解为三具独立构造体）
note: 挽昼并非单一个人，而是三位智能构造体的共同体——三人名字的最后一个字连起来是「娜薇妲」
bodies:
  艾尔妲·挽昼（Eldreda Sunbringer）: 西服形象，最接近本体。罗斯凯利法最高执政官，掌管政务统理局
  林德薇恩·挽昼（Lindverne Sunbringer）: 保留百年前挽昼的军大衣形象。掌管空域巡戍局
  德蕾琪娜·挽昼（Dracaene Sunbringer）: 萝莉形态，灰白短髮小角。掌管算理中枢局，继承最多智能与算力
achievements:
  - 成功消解天上的「巢主」空洞从而获得虚狩称号
  - 创立玛瑟尔集团，至今仍是邦布的主要生产与发售商
  - 发明邦布——听说搭档乔伊斯通过帕帕戈空洞后路线数据像胡萝卜，便做成兔子造型
  - 建立浮空理想国罗斯凯利法——旨在打造没有压迫与歧视的安宁之地
conflict: 同为初代虚狩的蕾米埃尔·丹在现代仍存活，却因不明原因与挽昼反目。曾登上罗斯凯利法意图刺杀挽昼未遂，被列为通缉犯。3.0版本中两人激烈对峙
