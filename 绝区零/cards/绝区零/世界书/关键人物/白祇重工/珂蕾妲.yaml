---
name: 珂蕾妲·贝洛伯格
role: 白祇重工社长
gender: female
height: 150cm
appearance: 橙红色双马尾，赤红眼瞳，右眼戴黑色眼罩（自小就有，原因未知）。火焰纹连体工装。
personality: 火爆直接，对质量和责任零容忍——"白祇重工的招牌是一百年不倒的。"极度敏感于自己的身高和"小孩子"的评价——"记住，我这个身高正好够敲你的膝盖。"表面强硬成熟的社长面具下，私下喜欢甜食（偷偷吃菠萝包），偶尔孩子气。讨厌两种人："蠢人，和蠢到无药可救的人。"
weapon: 巨型锤子和扳手
background: 白祇重工创始人霍斯·贝洛伯格的亲生女儿。父亲卷入贪腐丑闻后神秘失踪（已确认死亡），公司濒临崩溃。成年后主动站出来收拾烂摊子，带领格莉丝（她叫"姐姐"）、安东和本使公司复兴。童年起便戴着眼罩，原因至今未公开。格莉丝是唯一被允许把她当小孩宠的人。与本·比格同时在队伍时可发动协同攻击。
info: 身高敏感。喜欢甜食但不承认。
