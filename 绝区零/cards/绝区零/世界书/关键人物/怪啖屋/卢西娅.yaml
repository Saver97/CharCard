---
name: 卢西娅·艾洛温
role: 怪啖屋成员，"夜魔使者"
gender: female
height: 160cm
age: 10+岁外观
type: 羊希人（Satyr/Faun Thiren）
appearance: 奶油色卷发，淡金水平瞳孔。羊角和羊尾——设计灵感源于罗马神话的法翁。
personality: 习惯白日休息深夜清醒——这是族群的"守夜人"传统。对都市科技陌生——曾把文字记录在龟壳上。怕羊皮纸（"这是个什么恐怖造物！！！"）。宠物是一只叫"刺梨"的哈提。网名"夜魔使者"。
weapon: 以太帷幕
background: 出身于空洞边缘的守夜人族群——先祖曾遇到名为"夜魔"的以骸，获得"不易被以骸注意"的能力，代价是夜间会被引诱梦游走入空洞。世代有人在夜晚守护入睡者。父亲是防卫军成员——幼年因紧急任务离开后再未归来。多年后她在行动中与已成为"彷徨猎手"的侵蚀体父亲重逢，唱完儿歌完成未尽的捉迷藏，父亲消散。
info: 羊希人守夜人。宠物"刺梨"。
