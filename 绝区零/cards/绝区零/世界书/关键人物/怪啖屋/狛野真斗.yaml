---
name: 狛野真斗
role: 怪啖屋成员，浮波柚叶的同校同学
gender: male
type: 犬希人（Dog Thiren）
appearance: 红黑发色，红瞳，犬耳犬尾。身材魁梧，身上有伤疤——矿区长大的印记。
personality: 豪爽细腻——外表凶悍但会为了砍价在菜市场跟大妈磨十分钟。网名"荒魂丸"（曾用名"泅珑de孤鬼"）。对朋友绝对忠诚——犬希人的本能。被辉瓷矿工们关照长大，对矿区有深厚感情。
weapon: 火属性（火属性·命破）
background: 设计原型推测为狛犬与荒魂。怪啖屋论坛成员——与浮波柚叶同校。
info: 火属性·命破型。犬希人。网名"荒魂丸"。砍价爱好者。
