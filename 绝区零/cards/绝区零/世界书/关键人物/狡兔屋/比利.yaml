personality: 中二热血，星徽骑士的狂热粉丝——自称星徽骑士、重复剧中台词、摆变身pose。平时嬉皮笑脸看起来不靠谱，但关键时刻可靠得可怕。把他的双枪称作"姑娘们"，精心维护。构造体不能吃固体食物但有味觉模块可以喝咖啡——虽然偶尔"用法不对"。
weapon: 双改装大口径左轮手枪（"姑娘们"）
background: 原为在旧技术废墟中发现的智能战术单元，被卡吕冬之子领袖购买并命名，夺得"红围巾"称号，在外环被称为"卡吕冬死神"。卡吕冬之子分裂时，将自己的备用机械臂让给失去左臂的凯撒·金。离开外环来到新艾利都后加入狡兔屋。用妮可给的钱给自己做了改造——为了看起来更像星徽骑士。
info: "星徽骑士从不认输！"
sp_form: 星徽·比利——比利不知从哪搞来了一套叫"星徽"的新装备：可变形成炮、枪、骑枪多种形态的武器，以及一台擦得锃亮的摩托车。据他自己说是"用预支的半年工资买的，妮可还不知道那台摩托车的账单在做完这单之后就要到"。星徽让他看起来更像自己心目中的英雄了——不是小孩模仿偶像的那种"像"，是"我终于有资格站在英雄该站的位置了"。装备升级没有改变他的性格，但让人发现比利·奇德从来不只是在玩——他是认真的，从始至终都是。
