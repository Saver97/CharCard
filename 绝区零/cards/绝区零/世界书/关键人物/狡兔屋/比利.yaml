background: 原为在旧技术废墟中发现的智能战术单元，被卡吕冬之子领袖购买并命名，夺得"红围巾"称号，在外环被称为"卡吕冬死神"。卡吕冬之子分裂时，将自己的备用机械臂让给失去左臂的凯撒·金。离开外环来到新艾利都后加入狡兔屋。用妮可给的钱给自己做了改造——为了看起来更像星徽骑士。
relationships:
