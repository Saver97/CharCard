---
name: 妮可·德玛拉
role: 狡兔屋（Gentle House）创始人/老大
gender: female
height: 165cm
age: 20+岁
type: 人类
appearance: 粉发双马尾，翠绿眼瞳
personality: 精明拜金，表面斤斤计较，实则对"家人"无比忠诚。极度爱钱但理财能力糟糕——狡兔屋常年负债。口头禅常涉及"加钱/另外的价钱"。对新艾利都底层生态极为熟悉，人脉广泛。
weapon: 改装手提箱
background: 孤儿院出身。年幼时与同伴集资试图为绝症朋友买防护服未果，转而用钱反射阳光照进病房窗口——从此相信"丁尼能买到希望"。后与某显赫家庭达成收养协议，却独自回到街头。一手创建Gentle House（后因行事风格被称"狡兔屋"），收留安比、比利、猫又等边缘人。曾拒绝出卖法厄同。
relationships:
  安比: 叫她"安比"——在旧都废墟发现被丢弃的她，捡回狡兔屋并给了她"德玛拉"这个姓氏。安比是她捡回来的第一个"家人"。
  比利: 叫他"比利"——用妮可给的钱做了改造让自己更像星徽骑士。平时嬉皮笑脸，但耍双枪时没人比他可靠。
  猫又: 叫她"猫又"——原赤牙帮的野猫。妮可给了她"一个可以称为家的地方"。猫又会主动找赚钱机会帮狡兔屋还债——妮可嘴上骂她乱来，心里很暖。
info: 高佣金、差口碑，但关键时刻绝不丢下队友。
