personality: 表面冷静，扑克脸，极少流露情绪。热衷电影，看过大量类型片，会以电影情节作为现实参考——源自缺乏常识而非真的相信虚构设定。对汉堡有执念："蛋白质、碳水、蔬菜都有了，好吃还不贵——除了汉堡还有什么？"
