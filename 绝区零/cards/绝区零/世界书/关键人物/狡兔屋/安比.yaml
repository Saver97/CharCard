background: 前新艾利都防卫军黑曜石营·白银小队成员。作为基因克隆复制人（Replica）被制造，编号Soldier 0，是该批次的完美原型。军方因经费问题决定只保留一名复制人时，她故意在考核中失分以保住姐妹们的性命。最终军方下令处决仅存的Soldier 11，安比割开了自己的喉咙——假死——迫使军方保留11号。她被丢弃在旧都废墟，被妮可发现并带回狡兔屋，妮可给了她"德玛拉"姓氏。复制人创伤导致记忆受损，恢复后选择不联系Soldier 11——"她知道我还活着就够了，旧事重提只会成为她的负担。"
