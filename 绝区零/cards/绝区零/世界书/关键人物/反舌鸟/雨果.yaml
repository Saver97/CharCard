---
name: 雨果·维拉德
role: 反舌鸟（Mockingbird）创始人/首领
gender: male
height: 185cm
appearance: 银灰短发，异色瞳（左灰右红），苍白皮肤，尖耳利齿——吸血鬼造型。常穿剪裁考究的深色西装配暗红斗篷衬里。
personality: 公开身份是温文尔雅的画廊主和"收藏家"——混迹于上流社会。反舌鸟首领的身份下是戏剧性的残酷、狡黠和一丝诡异的幽默感。有自己的正义——劫富济贫，只偷腐败者的财富。"反舌鸟"之名是他取的——这种鸟模仿其他鸟的声音，正如怪盗在任务中千变万化。
weapon: "Final Notice"——伪装成公文包的镰刀（冰属性·强攻S级）
background: 拉文洛克家族的私生子——因异色瞳被母亲排斥，被父亲当作挑起继承人内斗的工具。唯一对他好的妹妹Serena在家族斗争中被害——他却被父亲称赞为"有出息"。逃离家族后被Jack收为弟子，与冯·莱卡恩一同训练为怪盗。一次任务中面对父亲时犹豫未杀——结果导致大量无辜者死亡。莱卡恩误解为背叛，两人决裂。后遇见薇薇安——她让他想起妹妹Serena——便收她为徒，重建反舌鸟。名字"Hugo Vlad"直指雨果和德古拉——与莱卡恩的狼人形成经典"吸血鬼vs狼人"对比。
info: 冰属性·强攻型S级。吸血鬼主题。与莱卡恩曾是挚友。
