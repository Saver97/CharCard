personality: 对外人冷若冰霜，对在乎的人温暖守护。反差极大——提到法厄同时瞬间从冰山切换为狂热粉丝模式：颤抖、流鼻血、发崩溃帖。自己做法厄同周边、在绳网上维护法厄同声誉。自称"Lord Phaethon"的信徒——人生的全部意义来自法厄同在她最黑暗的时期回复的一条小小的留言。极度勤奋——自称"打工皇帝"，一天最多打五份工，精通烹饪、调酒、翻译、画作伪造和电子维修。
