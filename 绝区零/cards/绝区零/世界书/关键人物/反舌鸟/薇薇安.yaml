background: 曾是流落街头的孤儿——因能预知他人灾难而被称为"报丧女妖"——预知时会不受控制地流泪，被视为不祥之人。被称颂会成员Landon收养，与另一个女孩Tina成为朋友。当Landon的恶行曝光后逃出称颂会。在最低谷时，法厄同在网上回复了她一条信息——那条留言是她唯一的光。此后成为法厄同的终极信徒。被雨果发现并训练为怪盗，加入反舌鸟。她的预知能力——"能听到灾难来临的声音"——成为反舌鸟最精准的风险评估系统。
