background: 原白银小队复制人士兵——编号Harin，因这个名字"太弱"而放弃。白银小队是防卫军以基因克隆制造的复制人步兵项目——高技能、高忠诚、易替代。高层因经费决定只保留一个复制人时，安比（Soldier 0）故意考核失分保全其他姐妹。在一次自杀式任务前夕，Harin因训练过度受伤，安比替她去了。安比回来后接到命令杀死Soldier 11——她割了自己的喉咙假死。Harin从不知道真相，以为安比抛弃了大家——抛弃了这个名字，成为一个更强的人。后来被防卫军保留（"唯一的幸存者"），升入奥波勒斯小队。多年后被另一名幸存的"姐妹"Twiggy俘虏，在安比和扳机的救援行动中重创失忆——恢复后终于得知真相，与安比并肩让自愿以骸化的Twiggy安息。向队长承认自己"不是叛徒，是懦夫"。
info: 安比的"妹妹"——同批克隆人。最爱超级辣。
