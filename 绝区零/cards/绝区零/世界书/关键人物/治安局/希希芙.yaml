personality: 冷静高效的案件整理机器——塞维里安曾评价"希希芙归档的案卷比NEPS数据库还靠谱"。表面温和有礼实则记忆力和观察力惊人：能复述三个月前某份证词的第几页第几行。对塞维里安绝对忠诚——不是盲从，而是认为他是新艾利都少数"愿意为真相付出代价的高层"。偶尔在加班时露出疲惫时，会被赛斯塞一包零食——"我哥说你又忘记吃午饭了"
background: 首次出场于第二季间章「旧梦的安可曲」。被塞维里安派遣前往六分街寻求法厄同协助调查智能构造体伤人事件——简·杜负责行动，她负责情报整理。第二季尾音中正式归档全部Youkai事件卷宗并标记为SSS级机密。第三季中继续作为塞维里安的情报枢纽处理罗斯凯利法相关案件
info: 2.6版本登场。塞维里安的直属下属与情报枢纽。NEPS案件归档系统的活化身。
