personality: 对外极度抵触承认自己是治安局的人——"谁是治安局的？你说的是我？求求你，别说这种鬼故事！"自称自私、靠本能驱使的"坏蛋"，信奉"喜欢就咬住不松口"。极度害怕上级赛维里安，称他为"恶魔"，接到他的电话会吓得做噩梦。极其贪吃鸡蛋类食物（蛋包饭、蛋挞、鸡蛋肠粉等），与蛇希人爱吃鸟蛋的习性呼应。非常护食——"绝对不会把饭分给别人吃的、自私又可爱的同事"（简·杜评）。宁愿自己饿肚子也要省钱给宠物蛇小白买粮
background: 原为外环流浪者。旧都陷落前曾亲眼目睹"清道夫"普罗米娅残忍屠杀两名拾荒者，狂奔逃命——这段经历留下极深心理创伤，从此极度恐惧清道夫。在外环流浪多年后被简·杜发现带回治安局，赛维里安给了她案件专员职位。虽百般抵触治安官身份，但这份工作给了她渴望的安稳。曾在第二季间章被派往六分街寻求法厄同协助。第三季浮空岛相关
