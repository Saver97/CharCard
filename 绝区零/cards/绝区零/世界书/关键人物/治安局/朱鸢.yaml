---
name: 朱鸢
role: 新艾利都治安局（N.E.P.S.）刑侦特勤组组长/朱雀
gender: female
height: 175cm
appearance: 黑发高马尾，赤红眼瞳。常穿治安局长官制服，黑色为主红色镶边，左肩朱雀纹章。
personality: 完美主义——从案卷归档到茶杯摆放都有严格标准。职业生涯零悬案。表面冷酷执法者，私下可靠温暖——被队员称为"朱鸢妈妈"。怕猫怕小动物（掉毛弄脏制服不可接受）。偷偷养了一盆番茄在办公室。为团队聚会下厨做新艾利都风味炒菜。
weapon: 定制手枪"Suppressor K22"（以太鹿弹+制导子弹，以太属性·强攻S级）
background: 童年被困空洞中，警官贾斯汀·布林格牺牲防护装备救了她。深受感动，立志从警。在治安培训学院与星见雅成为好友。毕业即获年度新人，被任命为刑侦特勤组组长。特勤组以四象命名：朱雀（朱鸢）、青龙（青衣）、白虎（赛斯）、玄武（简·杜）。后来发现童年恩人布林格涉及称颂会阴谋——对她的价值观冲击巨大。被广泛认为将是下一任治安局局长。
info: 以太属性·强攻型S级。完美主义者。怕猫。养番茄。
