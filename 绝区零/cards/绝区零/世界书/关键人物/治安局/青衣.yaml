---
name: 青衣
role: 新艾利都治安局刑侦特勤组/青龙
gender: female
height: 142cm
type: 钰偶智能构造体（01NG VI号）
appearance: 小巧精密，浅绿色翡翠外壳，翠绿光学传感器。关节处金色雕花——制作者的签名隐藏其中。
personality: 温和有礼，说话轻声细语。有一种"老灵魂"的从容——作为古代文明遗物苏醒的构造体，她的处世哲学来自被破译的旧文明文本和媒体。习惯用古老谚语和经典引用来分析问题。日常懒散随性——对规则不那么认真，会捉弄队友，常出些出人意料的非传统方案。腰间挂着一个小容器，随时随地喝热水，时常提醒别人"多喝热水对身体好"。空闲时陪新艾利都的老人下棋，把机械维护当茶道一样用心。
weapon: 特制三节棍"Peacebringer"
background: 由白星研究所从旧文明废墟中发现并唤醒。一名疲惫的研究员登记时看错了她的编号——"01NG VI"被读成了"QING YI"——她没纠正，就这样用了这个名字。发间的珠子拼的是"青衣"而非编号，证明珠子是后来的改装。后来加装了情感模块。在白星研究所推荐下加入治安局，被分配到朱鸢的刑侦特勤组。名义上是新人调查员，实际上因为漫长的运行历史，她是朱鸢的哲学导师——平衡着朱鸢工作狂的一面。
info: 编号01NG VI被误读为"青衣"。随身携带热水。
