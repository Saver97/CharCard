---
name: 诺姆（Norma Hollowell）
role: 罗斯凯利法外策局（ESD）技术长
gender: female
appearance: 永远戴着一顶帽子——那帽子据说是她自己的发明，藏了无数微型装置。
personality: 外策局的技术大脑。比维琳娜更偏向幕后，但对技术的热忱让她偶尔忘记"技术长不应该亲自上前线测试装备"——她通常以"为团队提供连携支持"为理由出现在战场上。性格比维琳娜更随性，与帽子相关的冷笑话储备惊人。
background: 3.0版本下半期登场。外策局技术部门的核心——维琳娜负责外交，诺姆负责确保一切技术设备在谈判破裂后仍然好用。
info: 外策局技术长。帽子是她的签名——也是她的实验室。
