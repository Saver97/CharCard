---
name: 维琳娜（Velina Airgid）
role: 罗斯凯利法外策局（ESD）总务官
gender: female
appearance: 外策局高官，着装干练简洁。首位掌握「风」之力的代理人——能召唤广域气旋，范围近乎覆盖整个战场。
personality: 冷静务实，处事高效。作为外策局总务官，负责引导法厄同兄妹深入罗斯凯利法政务——她代表的是挽昼的理想国对外界的"第一印象"。在行政与实战之间切换自如，是罗斯凯利法少有的既懂政治又亲自上阵的高层。
background: 3.0版本「一个梦游者的自白」中登场。罗斯凯利法——挽昼建立的浮空理想国——一直对外界保持神秘。维琳娜是第一个向法厄同兄妹敞开大门的罗斯凯利法人——她需要绳匠的力量，但她也在审视绳匠的立场：是盟友，还是又一个试图利用浮空岛的势力？
info: 首位风属性代理人。外策局总务官。罗斯凯利法对外窗口。
