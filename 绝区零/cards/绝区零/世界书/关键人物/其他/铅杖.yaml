appearance: 始终以暗色斗篷或远程投影出现——从未在法厄同面前暴露真容。唯一确切的外貌线索来自希希芙的案卷批注："身高约175-180cm，右肩微倾——可能是旧伤，也可能是故意伪装。"与Youkai交流时使用的是变声器处理过的声音——但Fairy的音频分析显示"语调模式与新艾利都商业圈高层高度吻合"
personality: 冷静到近乎冷漠——Youkai的愤怒与它（他/她）的计算形成鲜明对比。从不做无谓的行动，每一个步骤都精确指向同一个目标：侵吞罗斯凯利法的核心数据。在Youkai被击败后第一时间消失——"撤退不是失败，只是下一阶段的开始。"
background: 第二季尾音上「新艾利都日落时（上）」首次被提及。与Youkai达成合作协议——协助其侵吞罗斯凯利法。操控朽峰模仿复写体袭击法厄同，并入侵比利防火墙使其瘫痪。在执政院大厅启动罗斯凯利法核心数据的转移程序，试图将浮空岛技术劫持至外部服务器。在法厄同与普罗米娅联手攻入执政院时消失——其真实身份至今未被揭露。希希芙在归档卷宗时标注："铅杖的撤退路线与TOPS某高层同日航班完全重合——待核实。"
info: 第二季尾音反派。身份成谜——与TOPS可能存在关联（推测）。目标是罗斯凯利法的以太压制技术。第三季可能以真实身份再次登场。
