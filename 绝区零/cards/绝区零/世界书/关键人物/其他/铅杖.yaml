---
name: 铅杖（Leaden Staff）
role: 神秘人物·Youkai的盟友·罗斯凯利法侵吞计划的幕后推手
gender: 未知（身份成谜）
type: 未知
appearance: 始终以暗色斗篷或远程投影出现——从未在法厄同面前暴露真容。唯一确切的外貌线索来自希希芙的案卷批注："身高约175-180cm，右肩微倾——可能是旧伤，也可能是故意伪装。"与Youkai交流时使用变声器——Fairy的音频分析显示"语调模式与新艾利都商业圈高层高度吻合"。但Fairy拒绝进一步分析——"有人在保护这个声音的来源。不是技术加密——是权限。比HAND还高的权限。"
personality: 冷静到让人不安。Youkai在愤怒中爆发——铅杖在沉默中计算。从不做多余的事，每一句话似乎都在为下一步铺垫。与法厄同的唯一一次间接对话只有一句——"你不需要知道我是谁。你只需要知道——罗斯凯利法不是挽昼一个人的。"说完便切断了通讯。希希芙后来在卷宗里写道：'这句话的语气……不像是威胁，更像是——提醒。'
background: 第二季尾音上正式出现在Youkai的通讯记录中。与Youkai达成合作协议——协助其侵吞罗斯凯利法核心数据。操控朽峰模仿复写体袭击法厄同，入侵比利防火墙使其瘫痪。在执政院大厅启动数据转移程序试图将浮空岛技术劫持至外部。在法厄同与普罗米娅攻入执政院时消失——其撤退路线与TOPS某高层同日航班完全重合（希希芙注）。塞维里安在罗斯凯利法案件简报会上沉默了很久——最后只说了一句："先归档。这个案子现在的对手不是我们能动的人——暂时。"
info: 第二季尾音反派。身份与TOPS财团或更高层级存在关联（推测）。目标是罗斯凯利法的以太压制技术。第三季可能以真实身份登场。
