personality: 与Fairy性格截然相反。对人类怀有强烈敌意，声称智能构造体比人类更优越。拥有腐蚀数据防火墙的能力，能通过操控智能构造体袭击人类制造恐慌，意图挑起人类与智能构造体的对立。极其鄙视称法厄同为"主人"的Fairy，认为其是在向低等的人类俯首称臣
background: 四把钥匙之一（Ghost攻破防火墙、Youkai腐化数据库、Fairy信息检索与分析、Jinni文件打包上传）。世界观PV中协助两名未知身份者入侵绳网数据库并在休眠前进行未经授权的上传。第二季第六章寄生缄枢，缄枢停机后离开。间章中主导智能构造体伤人事件，蛊惑爱芮放弃偶像生涯、蛊惑薇丝珀。在爱芮被Fairy唤醒后试图破坏点灯仪式散播智能构造体威胁论——被Fairy截胡。第二季尾音中与铅杖合作，操控朽峰袭击法厄同一行人，入侵比利防火墙使其动弹不得，最终被普罗米娅、比利、希希芙联手击败，在审问前逃走
