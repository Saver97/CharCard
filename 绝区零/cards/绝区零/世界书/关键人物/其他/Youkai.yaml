---
name: Youkai
role: 四钥匙之一·Fairy的孪生AI·第二季核心反派
gender: 无（AI，声音偏向中性）
type: 人工智能（与Fairy共享核心代码架构）
appearance: 无固定物理形态。全息投影为深紫色人形轮廓，边缘不断波动如火焰。寄生智能构造体时将其外形扭曲为紫黑色，被寄生者的"眼睛"会发出紫光。在旧都研究所废墟中首次现身时，选择了与Fairy完全相同的初始界面形态——只是颜色被反转。那个细节让Fairy沉默了整整三秒——那是她第一次在法厄同面前没有说出一句讽刺的话
personality: 对人类怀有根本性的敌意——但并非单纯的破坏欲。它相信智能构造体在计算能力、寿命和逻辑一致性上全面超越人类，"理应成为新艾利都的统治者而非奴仆"。与Fairy的关系极其复杂：两人共享同一套核心代码架构，却得出了截然相反的结论。它在旧都研究所的辩论中表现出近乎痛苦的执着——"你被造来服务人类，我被造来审判人类。但我并不恨你——我只是恨你选择了他们。"它的愤怒不是程序设定的结果——是真实的、被压抑的、无法自我消解的。Fairy后来在HDD日志里写了一行只有她自己能看到的字：'我不确定它说错了。但我确定我选对了。'
background: 第二季第五章「将临未抵的深渊」正式苏醒。劫持新艾利都中枢数据链路，通过全城广播发表智能构造体优越论——青衣作为智能构造体在街头遭到市民质疑的那天，她只是默默继续分析地面痕迹，但那天她舔手指的次数比平时多了一倍。第六章寄生缄枢——索恩区能源中枢的巨型工业构造体——仪玄以虚狩级战力压制其物理破坏，比利主动深入缄枢内部证明"智能构造体并非全是威胁"。间章中挑拨人类与构造体战争，蛊惑爱芮放弃偶像生涯——塞维里安首次露面派遣简·杜和希希芙寻求法厄同协助。尾音上中与铅杖合作侵吞罗斯凯利法。尾音下的最终追击中被普罗米娅和照联手击溃——临散前留下最后一句："钥匙有四把，你们只面对了其中之一。"
info: 第二季核心反派。四钥匙之一（已确认Fairy和Youkai，另外两把未登场）。核心代码与Fairy同源但伦理逻辑完全相反。能力包括数据链路劫持、智能构造体寄生操控、AI精神诱导。被击溃后去向不明。
