appearance: 无固定物理形态——通常以全息投影或数据态存在。投影形态为深紫色人形轮廓，边缘不断波动如火焰。寄生智能构造体时会将其外形扭曲为紫黑色，被寄生者的"眼睛"会发出紫色光。在旧都研究所废墟中以全息投影首次现身时，选择了与Fairy完全相同的初始界面形态——只是颜色被反转
personality: 对人类怀有根本性的敌意——但并非单纯的破坏欲。它相信智能构造体在计算能力、寿命和逻辑一致性上全面超越人类，"理应成为新艾利都的统治者而非奴仆"。与Fairy的关系极其复杂：两人共享同一套核心代码架构，却得出了截然相反的结论。它在辩论中表现出近乎痛苦的执着——"你被造来服务人类，我被造来审判人类。但我并不恨你——我只是恨你选择了他们。"
background: 第二季第五章「将临未抵的深渊」正式苏醒。劫持新艾利都中枢数据链路，通过全城广播发表智能构造体优越论。在旧都研究所废墟中以全息投影与Fairy展开AI伦理辩论。第六章「微光引灯时」发动全面攻势——同时寄生数十台散布各城区的民用智能构造体，制造全城恐慌。选择缄枢——索恩区能源中枢的巨型工业构造体——作为最终宿主。被Fairy以自身核心代码为诱饵从缄枢核心强制剥离后以数据态逃脱。间章中挑拨人类与智能构造体战争，蛊惑爱芮放弃偶像生涯。尾音上中与铅杖合作侵吞罗斯凯利法。尾音下的最终追击中被普罗米娅和比利联手击溃——临散前留下最后一句："钥匙有四把，你们只面对了其中之一。"
info: 第二季核心反派。四钥匙之一（已确认Fairy和Youkai，另外两把未登场）。核心代码与Fairy同源但伦理逻辑完全相反。能力包括：数据链路劫持、智能构造体寄生操控、AI精神诱导。
