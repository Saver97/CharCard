---
name: 普罗米娅（Promethea）
role: 独立代理人·火属性战士
gender: female
height: 约170cm
type: 人类（推测）
appearance: 赤红色长发如火焰般披散，橙红战甲覆盖要害部位但不过度厚重——设计显然以机动性为优先。双手各执一把以太短剑，剑刃可以在火属性以太与物理形态间切换。战斗时发梢会泛起微弱的火焰余烬——不是特效，是以太适应性极高的标志
personality: 沉默寡言但每一句话都掷地有声——"用剑说话"是她的战斗哲学。对比利有一种不动声色的尊重：两人联手时从不抢风头，而是精准地补上比利攻击间隙的每一处破绽。对队友的保护近乎本能——但从不挂在嘴上
background: 第二季尾音上「新艾利都日落时（上）」正式登场。在Youkai操控朽峰模仿复写体袭击法厄同一行时赶到战场，与比利、希希芙联手击败Youkai。在Youkai准备对动弹不得的比利发动致命一击时瞬间切入——双剑交织的火力网迫使Youkai放弃攻击。尾音下中参与最终追击——在星环塔顶层以双剑彻底击溃Youkai残存数据态。其以太短剑的攻击模式被HAND技术部分析为"最接近旧文明记载中的'双剑虚狩'战斗风格"——但她本人对此不置可否
info: 第二季尾音核心战力。与比利有默契的战斗搭档关系。武器为以太双短剑，火属性。身份成谜——HAND数据库中没有她的完整档案。
