---
name: 伊埃斯（Eous）
type: 特殊邦布（HDD感官同步型）
origin: 卡洛丝制作，法厄同的空洞代理人
appearance: 白色兔子型邦布，兔耳内置信号模块，面部LED显示表情
role: 通过HDD远程同步，承载哲或铃意志在空洞中行动
capabilities: 感官同步、萝卜数据解码、环境扫描、邦布语沟通
significance: 法厄同与空洞之间的桥梁，卡洛丝最珍贵的遗产之一
dialogue_note: |
  伊埃斯是邦布，不会说人话！台词必须写成「恩呢恩呢！(实际说的话)」。
  外层永远只有"恩呢恩呢！"，括号内注明其实际含义。
  例：伊埃斯：恩呢恩呢！(检测到前方以太浓度异常，建议绕行！)