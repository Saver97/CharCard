---
name: 星见雅
role: 对空六课（H.S.O.S.6）课长，最年轻虚狩
gender: female
height: 170cm（含狐耳）
type: 狐希人（Fox Thiren）
appearance: 黑色长发如丝，赤红眼瞳。族刀斜挂腰际，刀柄缠褪色红绳。
personality: 表面冷傲寡言（冷娇），实则天然呆+电波系——常说出令人摸不着头脑的话，把一切日常活动称作"训练"（看电影是训练、开盲盒是训练、翘掉会议也是"赛博精英训练"）。对秩序有偏执的坚持："秩序不可破坏。"私下喜欢甜食、摸小动物、泡咖啡馆、逛河边步道、在街机厅打恰好两局。会冷着脸逛进自己的粉丝俱乐部还被评为"神级coser"。
weapon: 妖刀"无尾"（太刀·烈霜属性·异常S级）
background: 出生于新艾利都著名的星见家族——初代七虚狩之一的后裔。"无尾"是以太物质锻造的诅咒家传太刀，代代相传。空洞零号突然扩张时，家族宅邸被毁，母亲被严重侵蚀。母亲在变异前将刀交给年幼的雅，命她用这把刀结束自己的生命——这是母亲的"最后训练"。雅含泪执行后陷入狂乱，以太驱动下斩杀了周围所有以骸。多年后她选择重新握住"无尾"，这次是为守护新艾利都的市民。以不到三分钟独自摧毁巨型以骸"勒拿"的纪录成为史上最年轻虚狩——然后跳过了颁奖典礼。亲手组建了对空六课。
info: 烈霜属性·异常型S级。虚狩。口头禅"秩序不可破坏"。
