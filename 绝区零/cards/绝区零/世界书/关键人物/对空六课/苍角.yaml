---
name: 苍角
role: 对空六课成员
gender: female
height: 145cm
type: 鬼族（Oni）
appearance: 蓝色皮肤，白色短发，头顶短小鬼角。戴战术面具。全队最矮——但没人敢拿这个开玩笑。
personality: 天真纯朴，心智如孩童。容易相信别人说的话。超级巨胃王——外号"贪食鬼"，讨厌浪费食物。因为童年全在战火中的叛军营地里度过，没有受过正规教育，不识字也不会写字，正在接受柳的家庭教育。说话经常念错字，写字会犯可爱的错误。但对"吃饱"和"保护柳"这两件事永远认真。
weapon: 鬼刃旗
background: 鬼族叛乱期间在战场上忍饥挨饿，与被称为"姐姐"的叛军首领相依为命。被柳从导弹下救出。不知道"姐姐"是柳亲手送去安息的——只知道战争结束后柳成了她的监护人，带她住进了新艾利都。两人现在相依为命，她叫柳"Nagi"。原来的面具在某次任务中损坏，柳给她换了新的。
info: 鬼族——实际年龄比柳大，但鬼族成长慢所以仍是孩子。最讨厌浪费食物。
