weapon: 喷气动力拳套"爆破手套K.O."
background: 卡吕冬之子的冠军继承者——上一任"红围巾"是比利·奇德（他仍开玩笑叫比利"师兄"）。拳套是全员合赠：大老爹下单、露西付款、柏妮思供燃料、派派运送、凯撒调试。大老爹赎了他整个债务后他说"只是又一个格斗场"——后来是全员让他真正把卡吕冬之子当家。
relationships:
