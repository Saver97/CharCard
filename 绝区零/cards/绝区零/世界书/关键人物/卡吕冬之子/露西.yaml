background: 新艾利都显赫的蒙特菲奥家族之女——全名Luciana Auxesis Theodoro de Montefio。家族对她做空洞调查员的梦想百般阻挠和情感虐待。她策划了自己的"绑架案"来逃跑——被凯撒在火狱骑行中的华丽出场意外"救下"。那一刻她看到的不只是救兵，是"自由的形状"。此后加入了卡吕冬之子，至今仍是新艾利都的"失踪人口"。
relationships:
