  派派: 叫他"派派"——调饮好友。用派派珍藏的艺术品酒杯，过生日时一起赏月吃饼。坐派派副驾时会数念珠。
  莱特: 叫他"莱特"（调侃时才叫"莱特先生"）——莱特拳套由全员合赠，露西负责付款。
