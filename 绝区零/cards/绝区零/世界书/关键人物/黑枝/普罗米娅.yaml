age: 20+岁
type: 人类
appearance: 银白色长发如霜雪垂落，气质是一座隐藏在水面下的冰山。她几乎总是戴着手铐——那不是别人的要求，是她加入黑枝时自己主动提出的唯一条件。战斗时手铐解开，披风如活物般自行攻向敌人，而她本人几乎不需要移动——冰霜以太在她周身凝为雾气，像一座会移动的极地风暴
personality: 沉默到近乎窒息——她会安静地站在房间角落里整整一小时不说一个字，直到有人问她问题，才简短回答三五个字。但她的沉默不是冷漠，是负重。"飞蛾注定消逝在无光的黑夜里…我并不觉得可悲。"她对自己的过去不辩解、不美化、不逃避——她只是在等，"我等待着，一场审判。"对黑枝的同伴——尤其是照——有一种不动声色的保护欲：从不挂在嘴上，但照每次出危险任务时她都"正好"在附近执行另一项裁决
weapon: 飞镖与披风——披风可自动索敌，战斗姿态如同冰雪中的行刑者。核心一击称为「处刑式·绝裁」——只有在对手已经陷入异常状态时才会出手，仿佛连杀戮都要遵守某种自我设限的仪式
background: 出身于外环臭名昭著的组织"清道夫"。那段过去是她从不提及的深渊——只知道她曾犯下让她至今背负愧疚的杀戮。加入黑枝时，照问她有什么条件。她说："给我一副手铐。不是用来锁我的——是用来提醒我，我还没有资格被原谅。"照同意了。从那以后，手铐就一直在她腕上。黑枝的其他成员起初以为那是某种武器，后来才知道——那是她自己给自己戴上的。"这既是束缚，也是对自己的审判。"
relationships:
