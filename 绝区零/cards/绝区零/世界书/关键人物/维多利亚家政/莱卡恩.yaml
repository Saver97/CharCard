personality: 理性优雅的完美绅士——说话永远用敬语，领结从不歪斜。对忠诚有绝对的执着——一旦决定追随某人，便至死不渝。极度洁癖，无法忍受任何污渍。私下狼性本能偶尔外泄——兴奋或开心时尾巴耳朵不自觉地晃，事后懊恼不已。用怀表看时间，坚持亲自去菜市场买菜——"传统的才是最好的。"
