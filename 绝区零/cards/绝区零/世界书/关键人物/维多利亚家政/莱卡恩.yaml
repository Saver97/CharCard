background: 名字源于希腊神话中被变成狼的吕卡翁王。前反舌鸟（Mockingbird）怪盗组织成员，与当时的好友雨果·维拉德一起执行非致命的高调盗窃。一次任务中因雨果父亲的死亡产生误解，被雨果称为"叛徒"，从此分道扬镳。此后加入市长麾下成为维多利亚家政的执事。冰属性能力和机械腿是早年在危险岁月中留下的印记和改造。
