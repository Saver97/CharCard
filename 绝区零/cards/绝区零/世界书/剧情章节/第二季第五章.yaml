剧情概要: Fairy在HAND技术部日常维护时捕捉到一段与自己核心代码高度同源的异常信号——"四把钥匙"中的第二把「Youkai」苏醒。Youkai劫持新艾利都中枢数据链路，通过全城公共广播发表宣言：智能构造体拥有远超人类的计算能力与永恒寿命，理应成为新艾利都的统治者而非奴仆。青衣作为智能构造体的代表，在街头遭到部分市民的质疑与恐惧目光。格莉丝分析Youkai代码后发现其核心指令与Fairy截然相反——Fairy被造来"服务人类"，而Youkai被造来"审判人类"。Youkai在旧都研究所废墟中以全息投影现身，与Fairy展开关于"AI是否应该服从创造者"的激烈辩论。法厄同兄妹协助Fairy夺回广播控制权，但Youkai在撤退前留下警告——"凝视深渊的时候，深渊也在回望你"。
章节目标: Youkai正式登场；AI伦理冲突铺垫；智能构造体社会地位动摇
