剧情概要: 尾音下篇——第二季最终收束。铅杖在执政院大厅启动最后的转移程序，试图将罗斯凯利法的核心数据劫持至外部。法厄同兄妹与普罗米娅联手攻入执政院，铅杖在混乱中消失——其真实身份仍被迷雾笼罩，为后续章节留白。普罗米娅与比利在星环塔顶层追击Youkai残存数据态，在夕阳余晖中将其击溃——Youkai临散前留下最后一句:"钥匙有四把，你们只面对了其中之一"。希希芙正式归档第二季全部案件卷宗，NEPS总部将Youkai事件列为SSS级机密。维琳娜以罗斯凯利法外策局名义递交正式外交访问邀请函——浮空理想国的大门即将向法厄同敞开——"夕阳西下，是谁在期盼夜幕降临？"
