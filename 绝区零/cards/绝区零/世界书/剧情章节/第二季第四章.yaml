---
name: 第二季第四章「可曾记得梦」
season: 第二季
chapter_id: 204
核心事件: 伊德海莉·墨菲登场；卢西娅与被侵蚀成彷徨猎手的父亲重逢
关键场景:
  - 怪啖屋据点（伊德海莉用触手泡茶招待法厄同——章鱼希人的待客之道）
  - 澄辉坪旧矿区（以骸活动异常报告，卢西娅感应到熟悉的以太波长）
  - 旧矿区深处·封闭矿道（卢西娅与彷徨猎手——她失踪多年的父亲——重逢）
  - 旧矿区·矿工临时礼拜堂（卢西娅唱完儿歌，父亲消散，伊德海莉回溯全程影像）
参与人物:
  - 伊德海莉·墨菲（章鱼希人，怪啖屋成员，能以触手回溯附着在物体上的过去影像——"记忆触摸"能力）
  - 卢西娅·艾洛温（羊希人守夜人，怪啖屋成员，自幼与父亲失散，能以「守夜人之眼」定位以骸方位）
  - 法厄同兄妹
  - 狛野真斗（犬希人，怪啖屋的防御担当，在矿道入口阻挡外部以骸涌入）
敌对目标: 彷徨猎手（卢西娅之父被以太完全侵蚀后形成的特化以骸，保留了生前部分记忆碎片）
剧情概要: 伊德海莉在怪啖屋据点以令人不安的"触手泡茶"迎接法厄同。澄辉坪旧矿区以骸活动异常——卢西娅感应到一股令她心悸的熟悉以太波长。深入矿道后，她面对的敌人是失踪十五年的父亲——如今已被以太侵蚀成彷徨猎手，在矿区中漫无目的地徘徊。伊德海莉以触手触碰矿道墙壁，回溯影像揭示十五年前矿难真相：卢西娅之父为掩护其他矿工撤离，用身体封堵了以骸涌出的裂缝。卢西娅唱起父亲教的儿歌，彷徨猎手停下攻击——它记得这个旋律。歌声中父亲消散为以太粒子，伊德海莉将全程影像保存在一枚辉瓷碎片中交给卢西娅——"捉迷藏结束了，爸爸被你找到了"。
章节目标: 怪啖屋全员集结；卢西娅父女线情感高潮；伊德海莉能力揭示
