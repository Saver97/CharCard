剧情概要: 法厄同兄妹追寻青溟剑与旧都陷落的关联来到云岿山。仪玄以"请喝茶"为名义设置入门考验——橘福福透露"门主每次用这招，来的人不是跑了就是住院了"。叶释渊在澄辉坪暗中调查辉瓷走私网络，发现黑枝外围势力正通过走私辉瓷渗透云岿山——这些以太武器级辉瓷被运往不明目的地。通过考验后，仪玄在修道场亲自教导以太呼吸法，正式收法厄同为弟子。在仪绛的墓碑前，仪玄终于开口——云岿山世代收留孤儿，背后是为了寻找能承受碎裂青溟剑力量的「受体」。仪绛是上一任受体，最终被剑的力量反噬。叶瞬光继承仪绛之志成为现任剑主，却对法厄同抱持敌意——"凭什么你们一来就被收为弟子，而我姐姐付出了生命？"
章节目标: 云岿山势力建立；青溟剑诅咒揭露；法厄同正式拜师；黑枝辉瓷走私线引入
