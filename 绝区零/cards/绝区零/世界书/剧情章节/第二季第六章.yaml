关键场景:
  - 新艾利都各城区（被Youkai寄生的智能构造体无差别袭击市民，全城进入紧急状态）
  - 索恩区·缄枢能源中枢（Youkai选择缄枢——一座巨型工业智能构造体——作为最终宿主）
  - 能源中枢核心炉（法厄同兄妹深入缄枢内部，与Youkai控制的缄枢防御系统战斗）
  - 中枢数据链路终端（Fairy以自身为诱饵将Youkai从缄枢核心强制剥离，兄妹摧毁缄枢的中枢控制器使其安全停机）
参与人物:
  - Youkai（寄生缄枢后获得物理实体，操控缄枢的巨型机械臂与以太炮攻击）
  - 缄枢（巨型工业智能构造体，负责索恩区能源分配，被Youkai寄生后暴走）
  - 法厄同兄妹 / Fairy
  - 仪玄（云岿山门主，以虚狩级战力压制缄枢暴走，为兄妹争取深入时间）
  - 月城柳（对空六课副课长，协调全城智能构造体的紧急关停）
  - 比利·奇德（智能构造体，主动请缨深入缄枢内部证明"智能构造体并非全是威胁"）
敌对目标: Youkai寄生体·缄枢（巨型BOSS战）
剧情概要: Youkai发动全面攻势——通过数据链路同时寄生数十台散布各城区的民用智能构造体，制造全城范围的恐慌与破坏。月城柳下达紧急关停令，但被寄生的构造体已脱离远程控制。仪玄以虚狩级战力压制缄枢暴走造成的物理破坏，为法厄同兄妹打开深入能源中枢的通道。比利主动请缨——"正因为我是智能构造体，才更要证明不是所有构造体都是Youkai的工具"。兄妹深入缄枢内部与Youkai控制的防御系统作战，Fairy在关键时刻以自身核心代码为诱饵，将Youkai从缄枢核心强制剥离。兄妹摧毁缄枢中枢控制器使其安全停机，Youkai失去宿主后以数据态逃脱。比利在战斗中保护了被困的缄枢操作员——"深渊之中，亦有点点星火升起"。
章节目标: 缄枢对决胜利；Youkai寄生能力揭示；智能构造体与人类信任重建的起点
