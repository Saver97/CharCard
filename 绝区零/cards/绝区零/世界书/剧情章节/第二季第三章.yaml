敌对目标: 白银军残党的自动防卫机甲（旧时代遗留，仍在执行已失效的作战指令）
剧情概要: 防卫军委托法厄同调查索恩区边界频繁出现的旧时代自动兵器——这些白银军残党的遗留机甲仍在执行数十年前的作战指令。席德驾驶「铸铁」冲入战场——"天然疯"的战斗风格让法厄同兄妹见识了防卫军最强机甲驾驶员的实力。扳机以太感知在完全黑暗中锁定隐藏的指挥单元，一枪终结自动兵器的指令源头。席德在废墟中发现「老席德」的同型机体残骸，触动童年回忆——旧都陷落时，这台智能构造体在废墟中用燃料换取她的存活。11号在简报室以冷峻但善意的态度向法厄同披露白银军的机密——她的克隆人同胞仍在某处等待解放。
章节目标: 奥波勒斯小队势力建立；防卫军线开启；白银军伏笔埋设
