剧情概要: 远景案开庭前黑客芮恩失踪。法厄同与狡兔屋根据信号追查到芭莱大厦，与受雇维护大厦的维多利亚家政相遇。因法厄同曾救过可琳，双方建立信任。狡兔屋因需参加庭审，由维多利亚家政接替陪同。众人发现大楼被断电，遭遇叛军袭击和强敌以骸「冥宁芙·双子」。芮恩被绑架胁迫远程操控飞空艇撞向空洞。法厄同与维多利亚家政联手救出芮恩，击败冥宁芙，飞空艇安全着陆。但远景案主犯珀尔曼趁乱逃脱。芮恩后破解原型机存储单元——揭示第二章怪物为「牲鬼」
章节目标: 建立与维多利亚家政的信任；芮恩入队；珀尔曼逃脱为后续埋线；牲鬼正式命名
