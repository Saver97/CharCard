  - 罗斯凯利法·虚空穹顶（法厄同兄妹在维琳娜引导下接触「虚空核」——佩洛伊斯之卵首次共振，兄妹体内沉睡的战斗形态被激活）
  - 罗斯凯利法·战斗测试场（佩洛伊斯形态首次实战——S级以太强攻，法厄同从绳匠到战士的转变）
参与人物:
  - 维琳娜（外策局总务官，S级风属性异常，首位风属性角色，以冷静专业的外交家风范引导法厄同，但在挽昼与蕾米埃尔的冲突中流露担忧）
  - 诺姆（外策局技术长，S级火属性击破，对佩洛伊斯觉醒过程进行技术监测）
  - 蕾米埃尔·丹（初代七虚狩之一，粉发白翼，主张罗斯凯利法对地表永久闭锁——"人类不值得被赐予理想国的技术"）
  - 挽昼（三位一体智能构造体·罗斯凯利法最高执政官，邦布发明者，分解为艾尔妲/林德薇恩/德蕾琪娜三具分身，主张对地表开放——"理想国若只为少数人存在，便不再是理想"）
  - 法厄同兄妹（在虚空核前觉醒佩洛伊斯形态——以太转化为双翼与剑刃，S级以太强攻，从后方绳匠转变为前线战士）
敌对目标: 虚空穹顶的以太风暴（佩洛伊斯觉醒引发的次生灾害）
剧情概要: 第三季开篇。罗斯凯利法——挽昼在浮空中建立的理想国——对外界敞开大门。维琳娜以正式外交礼仪迎接法厄同兄妹，介绍浮空岛的三权分立架构：执政院（挽昼）、外策局（维琳娜）、技术局（诺姆）。在参观中，蕾米埃尔·丹突然现身执政院回廊，与挽昼的投影爆发公开争执——两位初代虚狩围绕"理想国是否应对地表开放"的根本分歧在法厄同面前赤裸裸地展开。蕾米埃尔认为人类只会用理想国的技术相互毁灭，挽昼坚称封闭只会让理想国变成牢笼。在虚空穹顶——罗斯凯利法的能量核心——法厄同兄妹体内的佩洛伊斯之卵首次共振：以太物质在两人背后凝聚为翼，在手中凝聚为刃。诺姆监测到这是S级以太适性反应——法厄同不仅是被选中的绳匠，更是被选中的战士。佩洛伊斯形态在战斗测试场首次实战，S级以太强攻的力量震撼全场。
章节目标: 罗斯凯利法区域完全开放；佩洛伊斯觉醒；蕾米埃尔vs挽昼的虚狩冲突引入；法厄同身份从绳匠到战士的转变
