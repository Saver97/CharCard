name: 第三季第一章「某个梦游者的自白」
season: 第三季
chapter_id: 301
核心事件: 罗斯凯利法全面开放；维琳娜引导法厄同；佩洛伊斯觉醒；蕾米埃尔与挽昼对峙
关键场景:
  - 罗斯凯利法·接待大厅（维琳娜以正式外交礼仪迎接法厄同兄妹，介绍浮空岛三权分立架构）
  - 罗斯凯利法·外策局（诺姆展示罗斯凯利法独有的以太压制技术——比地表领先至少十年）
