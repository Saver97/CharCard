剧情概要: 法厄同追查珀尔曼来到外环，与凯撒达成协议——帮助卡吕冬之子完成火狱骑行即交出珀尔曼。现任霸主庞培展现光明磊落的霸主风范，却不知副手卢修斯已暗中对他下毒、将点火石替换为以太聚合催化剂。骑行当日卢修斯阴谋暴露——庞培被侵蚀化为「霸主侵蚀体」，临终揭露背叛并将火湖托付凯撒。凯撒舍身投入火湖投下真正的点火石，火湖重燃。凯撒继承成为代理霸主，卢修斯逃脱
章节目标: 外环势力建立；凯撒成为霸主；珀尔曼被移交；卢修斯阴谋为后续埋线
