<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>邦布面板 · 绝区零</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;justify-content:center;padding:20px}.container{max-width:600px;width:100%}.header{text-align:center;padding:24px 0 16px}.header h1{font-size:22px;color:#ffa726}.header p{color:#888;font-size:13px}.card{background:#16213e;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #1e2d50}.card h2{font-size:15px;color:#ffa726;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e2d50}.form-group{margin-bottom:12px}.form-group label{font-size:12px;color:#999;display:block;margin-bottom:4px}.form-group input,.form-group select{width:100%;background:#0f1b33;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#e0e0e0;font-size:14px;outline:none}.form-group input:focus{border-color:#ffa726}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.output-area textarea{width:100%;height:120px;background:#0a0f1f;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#a0d0a0;font-size:12px;font-family:monospace;resize:vertical;outline:none}.copy-btn{background:#2a4a6a;border:none;border-radius:6px;padding:6px 14px;color:#fff;cursor:pointer;font-size:12px;float:right;margin-top:-32px;margin-right:4px}.copy-btn:hover{background:#3a6a8a}.copy-btn.copied{background:#2a8a4a}.rules{background:#0f1b33;border-radius:8px;padding:12px;font-size:12px;color:#aaa;line-height:1.8}.footer{padding:16px;text-align:center;color:#555;font-size:11px}</style></head><body>
<div class="container">
<div class="header"><h1>🤖 邦布面板</h1><p>伊埃斯电量 · 邦布伙伴</p></div>
<div class="card"><h2>🔋 邦布状态</h2>
<div class="grid-2"><div class="form-group"><label>伊埃斯电量 %</label><input type="number" id="battery" value="100" min="0" max="100"></div><div class="form-group"><label>邦布伙伴（逗号分隔）</label><input id="partners" value="伊埃斯"></div></div></div>
<div class="card"><h2>📋 邦布规则</h2><ol class="rules"><li>在空洞中每回合消耗伊埃斯电量5~15%</li><li>电量低于20%发出警告</li><li>在Random Play充电恢复至100%</li><li>可携带多个邦布轮换</li></ol></div>
<div class="card"><h2>📤 YAML <button class="copy-btn" id="copyBtn" onclick="copyYaml()">📋 复制</button></h2><div class="output-area"><textarea id="output" readonly></textarea></div></div>
<div class="footer">绝区零 RPG · 邦布面板</div>
</div>
<script>
function updateYaml(){const b=document.getElementById('battery').value,p=document.getElementById('partners').value;let y='---\nbangboo.伊埃斯电量: '+b+'\n';if(p){const arr=p.split(',').map(x=>'"'+x.trim()+'"');y+='bangboo.邦布伙伴: ['+arr.join(',')+']\n'}else{y+='bangboo.邦布伙伴: []\n'}y+='---';document.getElementById('output').value=y}
function copyYaml(){const ta=document.getElementById('output');ta.select();navigator.clipboard.writeText(ta.value).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制';btn.classList.remove('copied')},1500)})}
document.querySelectorAll('#battery,#partners').forEach(el=>el.addEventListener('input',updateYaml));updateYaml()
</script>
</body></html>
