<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>世界观面板 · 绝区零</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px}.container{max-width:600px;width:100%}.header{text-align:center;padding:24px 0 16px}.header h1{font-size:22px;color:#4fc3f7}.header p{color:#888;font-size:13px;margin-top:4px}.card{background:#16213e;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #1e2d50}.card h2{font-size:15px;color:#4fc3f7;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e2d50}.form-group{margin-bottom:14px}.form-group:last-child{margin-bottom:0}.form-group label{font-size:12px;color:#999;display:block;margin-bottom:4px}.form-group input,.form-group select{width:100%;background:#0f1b33;border:1px solid #1e2d50;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;outline:none}.form-group input:focus{border-color:#4fc3f7}.form-group .hint{font-size:11px;color:#666;margin-top:4px}.rules{background:#0f1b33;border-radius:8px;padding:12px;font-size:12px;color:#aaa;line-height:1.8}.rules li{margin-left:16px}.output-area textarea{width:100%;height:120px;background:#0a0f1f;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#a0d0a0;font-size:12px;font-family:monospace;resize:vertical;outline:none}.copy-btn{background:#2a4a6a;border:none;border-radius:6px;padding:6px 14px;color:#fff;cursor:pointer;font-size:12px;float:right;margin-top:-32px;margin-right:4px}.copy-btn:hover{background:#3a6a8a}.copy-btn.copied{background:#2a8a4a}.footer{text-align:center;padding:16px;color:#555;font-size:11px}</style></head><body>
<div class="container">
<div class="header"><h1>🌍 世界观面板</h1><p>当前时间 · 地点 · 章节 · 计划</p></div>
<div class="card">
<h2>📅 世界状态</h2>
<div class="form-group"><label>当前时间</label><select id="time"><option>新艾利都·清晨</option><option>新艾利都·白天</option><option>新艾利都·傍晚</option><option>新艾利都·深夜</option></select></div>
<div class="form-group"><label>当前地点</label><input id="location" value="雅努斯区·六分街·Random Play"></div>
<div class="form-group"><label>当前章节</label><select id="chapter"><option>序章·法厄同</option><option>第一章·远景案</option><option>第二章·白祇重工</option><option>第三章·维多利亚家政</option><option>第四章·外环</option><option>第五章·落星风暴</option><option>星间日·天琴座</option><option>2.0·云岿山篇</option></select></div>
<div class="form-group"><label>当天计划</label><select id="plan"><option>录像店营业</option><option>绳匠委托</option><option>探索空洞</option><option>社交活动</option><option>自由行动</option></select></div>
</div>
<div class="card"><h2>📋 更新规则</h2><ol class="rules"><li>进入空洞时：world.当前地点 → 空洞名称</li><li>章节推进时：world.当前章节 → 新章节名</li><li>每日开始时更新当天计划</li><li>时空切换时更新当前地点</li></ol></div>
<div class="card"><h2>📤 YAML 输出 <button class="copy-btn" id="copyBtn" onclick="copyYaml()">📋 复制</button></h2><div class="output-area"><textarea id="output" readonly></textarea></div></div>
<div class="footer">绝区零 RPG · 世界观面板</div>
</div>
<script>
function updateYaml(){const t=document.getElementById('time').value,l=document.getElementById('location').value,c=document.getElementById('chapter').value,p=document.getElementById('plan').value;document.getElementById('output').value='---\nworld.当前时间: "'+t+'"\nworld.当前地点: "'+l+'"\nworld.当前章节: "'+c+'"\nworld.当天计划: "'+p+'"\n---'}
function copyYaml(){const ta=document.getElementById('output');ta.select();navigator.clipboard.writeText(ta.value).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制';btn.classList.remove('copied')},1500)})}
document.querySelectorAll('#time,#location,#chapter,#plan').forEach(el=>{el.addEventListener('change',updateYaml);el.addEventListener('input',updateYaml)});updateYaml()
</script>
</body></html>
