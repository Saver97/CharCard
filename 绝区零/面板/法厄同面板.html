<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>法厄同面板 · 绝区零</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;justify-content:center;padding:20px}.container{max-width:600px;width:100%}.header{text-align:center;padding:24px 0 16px}.header h1{font-size:22px;color:#f0c040}.header p{color:#888;font-size:13px}.card{background:#16213e;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #1e2d50}.card h2{font-size:15px;color:#f0c040;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e2d50}.form-group{margin-bottom:12px}.form-group label{font-size:12px;color:#999;display:block;margin-bottom:4px}.form-group input,.form-group select{width:100%;background:#0f1b33;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#e0e0e0;font-size:14px;outline:none}.form-group input:focus{border-color:#f0c040}.form-group .hint{font-size:11px;color:#666}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.output-area textarea{width:100%;height:160px;background:#0a0f1f;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#a0d0a0;font-size:12px;font-family:monospace;resize:vertical;outline:none}.copy-btn{background:#2a4a6a;border:none;border-radius:6px;padding:6px 14px;color:#fff;cursor:pointer;font-size:12px;float:right;margin-top:-32px;margin-right:4px}.copy-btn:hover{background:#3a6a8a}.copy-btn.copied{background:#2a8a4a}.footer{padding:16px;color:#555;font-size:11px;text-align:center}</style></head><body>
<div class="container">
<div class="header"><h1>⚡ 法厄同面板</h1><p>主角状态 · HP/SAN/发情度/侵蚀度</p></div>
<div class="card">
<h2>🔘 是否为法厄同</h2>
<div class="form-group"><select id="isPhaethon"><option value="true">✅ 是（扮演哲/铃）</option><option value="false">❌ 否（自定义角色）</option></select></div>
<div class="form-group" id="identityGroup"><label>主人身份</label><select id="identity"><option value="">待选择</option><option value="哲">哲（男性主角）</option><option value="铃">铃（女性主角）</option></select></div>
</div>
<div class="card"><h2>❤️ 生存参数</h2><div class="grid-2">
<div class="form-group"><label>HP</label><input type="number" id="hp" value="100" min="0" max="100"></div>
<div class="form-group"><label>SAN</label><input type="number" id="san" value="100" min="0" max="100"></div>
<div class="form-group"><label>发情度</label><input type="number" id="horny" value="0" min="0" max="100"></div>
<div class="form-group"><label>以太侵蚀度</label><input type="number" id="ether" value="0" min="0" max="100"></div>
<div class="form-group"><label>丁尼余额</label><input type="number" id="denny" value="5000" min="0"></div>
<div class="form-group"><label>同伴（逗号分隔）</label><input id="companions" value="" placeholder="妮可,安比"></div>
</div></div>
<div class="card"><h2>📤 YAML <button class="copy-btn" id="copyBtn" onclick="copyYaml()">📋 复制</button></h2><div class="output-area"><textarea id="output" readonly></textarea></div></div>
<div class="footer">绝区零 RPG · 法厄同面板</div>
</div>
<script>
function updateYaml(){const p=document.getElementById('isPhaethon').value==='true',i=document.getElementById('identity').value,h=document.getElementById('hp').value,s=document.getElementById('san').value,ho=document.getElementById('horny').value,e=document.getElementById('ether').value,d=document.getElementById('denny').value,c=document.getElementById('companions').value;let y='---\nprotagonist.是否为法厄同: '+p+'\n';if(p){y+='protagonist.主人身份: "'+i+'"\n'}y+='protagonist.HP: '+h+'\nprotagonist.SAN: '+s+'\nprotagonist.发情度: '+ho+'\nprotagonist.以太侵蚀度: '+e+'\nprotagonist.丁尼余额: '+d+'\n';if(c){const arr=c.split(',').map(x=>'"'+x.trim()+'"');y+='protagonist.同伴: ['+arr.join(',')+']\n'}else{y+='protagonist.同伴: []\n'}y+='---';document.getElementById('output').value=y}
function copyYaml(){const ta=document.getElementById('output');ta.select();navigator.clipboard.writeText(ta.value).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制';btn.classList.remove('copied')},1500)})}
document.querySelectorAll('#isPhaethon,#identity,#hp,#san,#horny,#ether,#denny,#companions').forEach(el=>el.addEventListener('input',updateYaml));updateYaml()
</script>
</body></html>
