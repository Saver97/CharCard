<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>空洞探索面板 · 绝区零</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;justify-content:center;padding:20px}.container{max-width:600px;width:100%}.header{text-align:center;padding:24px 0 16px}.header h1{font-size:22px;color:#ab47bc}.header p{color:#888;font-size:13px}.card{background:#16213e;border-radius:14px;padding:20px;margin-bottom:14px;border:1px solid #1e2d50}.card h2{font-size:15px;color:#ab47bc;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e2d50}.form-group{margin-bottom:12px}.form-group label{font-size:12px;color:#999;display:block;margin-bottom:4px}.form-group input,.form-group select{width:100%;background:#0f1b33;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#e0e0e0;font-size:14px;outline:none}.form-group input:focus{border-color:#ab47bc}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.output-area textarea{width:100%;height:120px;background:#0a0f1f;border:1px solid #1e2d50;border-radius:8px;padding:10px;color:#a0d0a0;font-size:12px;font-family:monospace;resize:vertical;outline:none}.copy-btn{background:#2a4a6a;border:none;border-radius:6px;padding:6px 14px;color:#fff;cursor:pointer;font-size:12px;float:right;margin-top:-32px;margin-right:4px}.copy-btn:hover{background:#3a6a8a}.copy-btn.copied{background:#2a8a4a}.rules{background:#0f1b33;border-radius:8px;padding:12px;font-size:12px;color:#aaa;line-height:1.8}.footer{padding:16px;text-align:center;color:#555;font-size:11px}</style></head><body>
<div class="container">
<div class="header"><h1>🌀 空洞探索面板</h1><p>当前空洞 · 以太浓度 · 探索进度 · 研究音擎</p></div>
<div class="card"><h2>🗺️ 空洞状态</h2>
<div class="form-group"><label>当前空洞</label><select id="hollow"><option value="">（不在空洞中）</option><option>零号空洞</option><option>克里特空洞</option><option>莱姆尼安空洞</option><option>芭蕾双塔空洞</option><option>厄匹斯港空洞</option><option>伴生空洞</option></select></div>
<div class="grid-2">
<div class="form-group"><label>以太浓度</label><select id="density"><option>低</option><option>中</option><option>高</option><option>危险</option></select></div>
<div class="form-group"><label>探索进度 %</label><input type="number" id="progress" value="0" min="0" max="100"></div>
</div>
<div class="form-group"><label>研究音擎（逗号分隔）</label><input id="resonia" placeholder="触发本能,超载分布"></div>
</div>
<div class="card"><h2>📋 探索规则</h2><ol class="rules"><li>进入空洞时设置当前空洞名称和初始以太浓度</li><li>深入空洞时以太浓度升高，探索进度增加</li><li>击杀以骸可能掉落研究音擎</li><li>离开空洞时清空所有空洞数据</li></ol></div>
<div class="card"><h2>📤 YAML <button class="copy-btn" id="copyBtn" onclick="copyYaml()">📋 复制</button></h2><div class="output-area"><textarea id="output" readonly></textarea></div></div>
<div class="footer">绝区零 RPG · 空洞探索面板</div>
</div>
<script>
function updateYaml(){const h=document.getElementById('hollow').value,d=document.getElementById('density').value,p=document.getElementById('progress').value,r=document.getElementById('resonia').value;let y='---\nhollow.当前空洞: "'+h+'"\nhollow.以太浓度: "'+d+'"\nhollow.探索进度: '+p+'\n';if(r){const arr=r.split(',').map(x=>'"'+x.trim()+'"');y+='hollow.研究音擎: ['+arr.join(',')+']\n'}else{y+='hollow.研究音擎: []\n'}y+='---';document.getElementById('output').value=y}
function copyYaml(){const ta=document.getElementById('output');ta.select();navigator.clipboard.writeText(ta.value).then(()=>{const btn=document.getElementById('copyBtn');btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制';btn.classList.remove('copied')},1500)})}
document.querySelectorAll('#hollow,#density,#progress,#resonia').forEach(el=>{el.addEventListener('input',updateYaml);el.addEventListener('change',updateYaml)});updateYaml()
</script>
</body></html>
